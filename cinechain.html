<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineChain — Build the longest film chain</title>
<meta name="description" content="Start from today's film and chain movies that share an actor — but each linking actor can only be used once. Go as long as you can.">
<meta name="theme-color" content="#0d0d0d">
<link rel="icon" type="image/png" href="/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--s1:#181818;--bdr:rgba(255,255,255,.1);--txt:#f0f0f0;--mut:#8d8d8d;--gold:#e8a000;--good:#5bbd7a}
body{font-family:'Inter',-apple-system,sans-serif;background:radial-gradient(circle at 50% -10%,rgba(232,160,0,.10),transparent 36%),linear-gradient(180deg,#101010,var(--bg) 340px);color:var(--txt);min-height:100vh;display:flex}
.wrap{max-width:480px;margin:auto;padding:26px 16px 70px;width:100%;text-align:center}
.logo{font-size:2rem;font-weight:800;letter-spacing:-.02em}
.logo b{color:var(--gold)}
.tag{color:var(--mut);font-size:.86rem;margin:6px 0 4px}
.kicker{color:var(--gold);font-weight:700;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px}
.score{font-size:.85rem;color:var(--mut);font-weight:600;margin-bottom:14px}
.score b{color:var(--gold);font-weight:800;font-size:1.4rem}
.chain{display:flex;flex-direction:column;align-items:center;gap:0;margin:0 auto 8px;max-width:340px}
.film{display:flex;align-items:center;gap:11px;width:100%;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:12px;padding:8px 11px;text-align:left}
.film.seed{border-color:rgba(232,160,0,.4);background:linear-gradient(110deg,rgba(232,160,0,.12),rgba(255,255,255,.04))}
.film img{width:38px;height:57px;border-radius:6px;object-fit:cover;background:#2a2a2a;flex-shrink:0}
.film .ft{font-weight:700;font-size:.88rem;line-height:1.2}
.film .fy{color:var(--mut);font-size:.72rem}
.via{display:flex;align-items:center;gap:6px;color:var(--gold);font-size:.7rem;font-weight:700;padding:5px 0;text-transform:uppercase;letter-spacing:.04em}
.via::before{content:"↓";font-size:.9rem}
.add{position:relative;max-width:340px;margin:12px auto 0}
.add input{width:100%;padding:12px 14px;border-radius:11px;border:1px solid var(--bdr);background:rgba(255,255,255,.05);color:var(--txt);font-family:inherit;font-size:.95rem;outline:none}
.add input:focus{border-color:rgba(232,160,0,.55)}
.ac{position:absolute;left:0;right:0;top:52px;background:#1c1c1c;border:1px solid var(--bdr);border-radius:11px;overflow:hidden;z-index:5;text-align:left;box-shadow:0 18px 50px rgba(0,0,0,.5);max-height:48vh;overflow-y:auto}
.ac-item{display:flex;align-items:center;gap:10px;padding:7px 9px;cursor:pointer}
.ac-item:hover{background:rgba(232,160,0,.12)}
.ac-item img{width:30px;height:45px;object-fit:cover;border-radius:5px;background:#333;flex-shrink:0}
.ac-item .nm{font-weight:600;font-size:.84rem}
.ac-item .yr{color:var(--mut);font-size:.72rem}
.feed{min-height:18px;color:#d98b8b;font-size:.78rem;margin:9px 0 0}
.row-btns{display:flex;gap:8px;max-width:340px;margin:12px auto 0}
.btn{flex:1;padding:11px;border-radius:11px;border:1px solid var(--bdr);background:transparent;color:var(--txt);font-family:inherit;font-weight:700;font-size:.85rem;cursor:pointer}
.btn.gold{background:var(--gold);color:#111;border-color:var(--gold)}
.hint{color:var(--mut);font-size:.78rem;margin:0 0 14px}
.result{margin-top:16px;padding:16px;border-radius:14px;border:1px solid var(--bdr);background:rgba(255,255,255,.04);display:none}
.result.show{display:block}
.result h2{font-size:1.3rem;margin-bottom:4px;color:var(--good)}
.result .sub{color:var(--mut);font-size:.82rem}
.loading{color:var(--mut);font-size:.9rem;padding:40px 0}
.foot{margin-top:24px;color:var(--mut);font-size:.74rem}
.foot a{color:var(--gold);text-decoration:none}
.cl-home{position:fixed;top:13px;left:13px;z-index:50;display:inline-flex;align-items:center;gap:5px;color:var(--mut);text-decoration:none;font-size:.78rem;font-weight:700;background:rgba(20,20,20,.6);border:1px solid var(--bdr);border-radius:999px;padding:7px 13px;backdrop-filter:blur(8px)}
.cl-home:hover{color:var(--gold);border-color:rgba(232,160,0,.45)}
@media(min-width:760px){.wrap{max-width:560px}.logo{font-size:2.5rem}.tag{font-size:1rem}.kicker{font-size:.78rem}.chain{max-width:460px}.film img{width:48px;height:72px}.film .ft{font-size:1rem}.add,.row-btns{max-width:460px}.add input{font-size:1.05rem;padding:14px 16px}.score b{font-size:1.6rem}.hint{font-size:.92rem}}
</style>
</head>
<body>
<a href="/" class="cl-home" aria-label="Back to CineLinks">← CineLinks</a>
<div class="wrap" id="cinechain-app">
  <div class="logo">Cine<b>Chain</b></div>
  <div class="tag">Chain films that share an actor</div>
  <div class="kicker" id="modeLbl">Daily</div>
  <div id="stage"><div class="loading">Loading today's starting film…</div></div>
  <div class="foot">Posters &amp; data from TMDB · part of <a href="/">CineLinks</a></div>
</div>
<script>
(function(){
  const IMG='https://image.tmdb.org/t/p/';
  const CAST_N=15; // only notable billed cast can be a link (kills trivial extra-based links)
  const DURATION=120; // seconds — build the longest chain before time runs out
  const SEEDS=[[157336,"Interstellar","/yQvGrMoipbRoddT0ZR8tPoR7NfX.jpg"],[27205,"Inception","/xlaY2zyzMfkhk0HSC5VUwzoZPU1.jpg"],[24428,"The Avengers","/RYMX2wcKCBAr24UyPD7xwmjaTn.jpg"],[155,"The Dark Knight","/qJ2tW6WMUDux911r6m7haRef0WH.jpg"],[19995,"Avatar","/gKY6q7SjCkAU6FqvqWybDYgUKIF.jpg"],[293660,"Deadpool","/3E53WEZJqP6aM84D8CckXx4pIHw.jpg"],[550,"Fight Club","/jSziioSwPVrOy9Yow3XhWIBDjq1.jpg"],[299536,"Avengers: Infinity War","/7WsyChQLEftFiDOVTGkv3hFpyyt.jpg"],[278,"The Shawshank Redemption","/9cqNxx0GxF0bflZmeSMuL5tnGzr.jpg"],[680,"Pulp Fiction","/vQWk5YBFWF4bZaofAbv0tShwBvQ.jpg"],[13,"Forrest Gump","/Cw4hIUIAmSYfK9QfaUW5igp9La.jpg"],[118340,"Guardians of the Galaxy","/r7vmZjiyZw9rpJMQJdXpjgiCOk9.jpg"],[671,"Harry Potter and the Philosopher's Stone","/wuMc08IPKEatf9rnMNXvIDxqP4W.jpg"],[1726,"Iron Man","/78lPtwv72eTNqFW9COBYI0dWDJa.jpg"],[68718,"Django Unchained","/7oWY8VDWW7thTzWh3OKYRkWUlD5.jpg"],[603,"The Matrix","/dXNAPwY7VrqMAo51EKhhCJfaGb5.jpg"],[299534,"Avengers: Endgame","/ulzhLuWrPK07P1YkdWQLZnQh1JL.jpg"],[475557,"Joker","/udDclJoHjfjb8Ekgsd4FDteOkCU.jpg"],[120,"The Lord of the Rings: The Fellowship of the Ring","/6oom5QYQ2yQTMJIbnvbkBL9cHo6.jpg"],[597,"Titanic","/9xjZS2rlVxm8SFx8kPC3aIGCOYQ.jpg"],[122,"The Lord of the Rings: The Return of the King","/rCzpDGLbOoPwLjy3OAm5NUPOTrC.jpg"],[106646,"The Wolf of Wall Street","/kW9LmvYHAaS9iA0tHmZVq8hQYoq.jpg"],[11324,"Shutter Island","/nrmXQ0zcZUL8jFLrakWc90IR8z9.jpg"],[99861,"Avengers: Age of Ultron","/4ssDuvEDkSArWEdyBl2X5EHvYKU.jpg"],[49026,"The Dark Knight Rises","/hr0L2aueqlP2BYUblTTjmtn0hw4.jpg"],[16869,"Inglourious Basterds","/3Gb6G2amMuKZmmCpRqM4N67s8eE.jpg"],[76341,"Mad Max: Fury Road","/hA2ple9q4qnwxp3hKVNhroipsir.jpg"],[271110,"Captain America: Civil War","/rAGiXaUfPzY7CDEyNKUofk3Kw2e.jpg"],[121,"The Lord of the Rings: The Two Towers","/5VTN0pR8gcqV3EPUHHfMGnJYN9L.jpg"],[672,"Harry Potter and the Chamber of Secrets","/sdEOH0992YZ0QSxgXNIGLq1ToUi.jpg"]];

  const stage=document.getElementById('stage');
  const isDaily=!/[?&]practice=1/.test(location.search);
  document.getElementById('modeLbl').textContent=isDaily?'Daily':'Practice';
  function api(p){return fetch('/api/tmdb?path='+p+'&language=en-US').then(r=>r.json());}
  function utcDay(){const n=new Date();return Math.floor(Date.UTC(n.getUTCFullYear(),n.getUTCMonth(),n.getUTCDate())/864e5);}
  function loadState(){try{return JSON.parse(localStorage.getItem('cinechainState'));}catch(_){return null;}}
  function saveState(o){try{localStorage.setItem('cinechainState',JSON.stringify(o));}catch(_){}}
  function esc(s){return (s||'').replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];});}

  let chain=[], usedActors=new Set(), usedFilms=new Set(), over=false, busy=false, timeLeft=DURATION, timerId=null;

  function fmtTime(s){ const m=Math.floor(s/60), x=s%60; return m+':'+(x<10?'0':'')+x; }
  function startTimer(){
    if(timerId) return;
    timerId=setInterval(function(){
      timeLeft--;
      const el=document.getElementById('timer'); if(el){ el.textContent='⏱ '+fmtTime(Math.max(0,timeLeft)); if(timeLeft<=15) el.style.color='#e8806f'; }
      if(timeLeft<=0){ stopTimer(); over=true; if(isDaily) persist(); render(); }
    },1000);
  }
  function stopTimer(){ if(timerId){ clearInterval(timerId); timerId=null; } }

  async function castOf(id){ const cr=await api('movie/'+id+'/credits'); return (cr.cast||[]).slice(0,CAST_N).map(function(c){return {id:c.id,name:c.name};}); }

  function render(){
    const links=chain.length-1;
    let html='<div class="score">Chain length <b>'+links+'</b>'+(over?'':' · <span id="timer">⏱ '+fmtTime(Math.max(0,timeLeft))+'</span>')+'</div>';
    html+='<div class="chain">';
    chain.forEach(function(f,i){
      if(i>0) html+='<div class="via">via '+esc(f.via)+'</div>';
      html+='<div class="film'+(i===0?' seed':'')+'"><img src="'+IMG+'w92'+f.poster+'" alt=""><div><div class="ft">'+esc(f.title)+'</div><div class="fy">'+(i===0?'Today’s film':('#'+i))+'</div></div></div>';
    });
    html+='</div>';
    if(!over){
      html+='<div class="hint">Add a film sharing an actor with <b>'+esc(chain[chain.length-1].title)+'</b> — each actor links only once.</div>';
      html+='<div class="add"><input id="ci" type="text" autocomplete="off" placeholder="Add a film…"><div class="ac" id="ac" style="display:none"></div></div>';
      html+='<div class="feed" id="feed"></div>';
      html+='<div class="row-btns"><button class="btn gold" id="finish">Finish chain</button></div>';
    }
    html+='<div class="result'+(over?' show':'')+'" id="result"></div>';
    stage.innerHTML=html;
    if(!over) wire(); else renderResult();
  }

  function wire(){
    const ci=document.getElementById('ci'), ac=document.getElementById('ac');
    document.getElementById('finish').onclick=function(){ stopTimer(); over=true; if(isDaily) persist(); render(); };
    ci.focus();
    let lk; ci.addEventListener('input',function(){ clearTimeout(lk); lk=setTimeout(function(){ lookup(ci.value,ac); },240); });
  }
  function lookup(q,ac){
    if(q.trim().length<2){ ac.style.display='none'; return; }
    api('search/multi&query='+encodeURIComponent(q)).then(function(r){
      const items=(r.results||[]).filter(function(x){return x.media_type==='movie'&&x.poster_path&&!usedFilms.has(x.id);}).slice(0,7);
      if(!items.length){ ac.style.display='none'; return; }
      ac.innerHTML=items.map(function(m){ return '<div class="ac-item" data-id="'+m.id+'" data-p="'+m.poster_path+'" data-t="'+esc(m.title)+'"><img src="'+IMG+'w92'+m.poster_path+'" alt=""><div><div class="nm">'+esc(m.title)+'</div><div class="yr">'+(m.release_date||'').slice(0,4)+'</div></div></div>'; }).join('');
      ac.style.display='block';
      ac.querySelectorAll('.ac-item').forEach(function(el){ el.onclick=function(){ ac.style.display='none'; addFilm(el.dataset); }; });
    });
  }
  async function addFilm(d){
    if(over||busy) return; busy=true;
    const feed=document.getElementById('feed'); if(feed) feed.textContent='Checking…';
    const mid=+d.id;
    try{
      const last=chain[chain.length-1];
      const cast=await castOf(mid);
      const ids=new Set(cast.map(function(c){return c.id;}));
      let link=null;
      for(const c of last.cast){ if(ids.has(c.id) && !usedActors.has(c.id)){ link=c; break; } }
      if(!link){ if(feed) feed.textContent='No shared (unused) actor with '+last.title+'. Try another film.'; busy=false; return; }
      usedActors.add(link.id); usedFilms.add(mid);
      chain.push({id:mid,title:d.t,poster:d.p,cast:cast,via:link.name});
      busy=false; render();
    }catch(e){ if(feed) feed.textContent='Network hiccup, try again.'; busy=false; }
  }

  function persist(){ saveState({day:utcDay(),finished:true,length:chain.length-1,chain:chain.map(function(f){return {title:f.title,poster:f.poster,via:f.via};})}); }

  function renderResult(){
    const links=chain.length-1;
    const dayN=utcDay()-Math.floor(Date.UTC(2026,0,1)/864e5);
    const share='⛓️ CineChain'+(isDaily?' #'+dayN:'')+'\nChain of '+links+' '+(links===1?'link':'links')+' from '+chain[0].title+'\n'+'🎬'.repeat(Math.min(links+1,12))+'\nhttps://cinelinks.vercel.app/cinechain.html';
    document.getElementById('result').innerHTML=
      '<h2>Chain of '+links+'!</h2>'+
      '<div class="sub">'+(chain.length)+' films linked'+(links>=8?' — masterful 🔥':links>=4?' — nice run':'')+'</div>'+
      '<div class="row-btns" style="margin-top:12px"><button class="btn" id="shareBtn">Share</button><button class="btn gold" id="again">'+(isDaily?'Practice':'New chain')+'</button></div>';
    document.getElementById('again').onclick=function(){ location.href='/cinechain.html'+(isDaily?'?practice=1':'?practice=1&r='+Date.now()); };
    document.getElementById('shareBtn').onclick=function(){ if(navigator.share){navigator.share({text:share}).catch(function(){});} else { try{navigator.clipboard.writeText(share);}catch(_){ } const b=document.getElementById('shareBtn'); b.textContent='Copied ✓'; } };
  }

  (async function(){
    try{
      if(isDaily){ const s=loadState(); if(s&&s.day===utcDay()&&s.finished){ over=true; chain=s.chain.map(function(f){return {title:f.title,poster:f.poster,via:f.via,cast:[]};}); render(); return; } }
      const seed=isDaily?SEEDS[(utcDay()%SEEDS.length+SEEDS.length)%SEEDS.length]:SEEDS[Math.floor(Math.random()*SEEDS.length)];
      const cast=await castOf(seed[0]);
      chain=[{id:seed[0],title:seed[1],poster:seed[2],cast:cast,via:null}];
      usedFilms.add(seed[0]);
      render();
      startTimer();
    }catch(e){ stage.innerHTML='<div class="loading">Error: '+e.message+'</div>'; }
  })();
})();
</script>
</body>
</html>
