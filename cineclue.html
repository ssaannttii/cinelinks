<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineClue - Guess the daily film from clues</title>
<meta name="description" content="A daily film-guessing game: name the movie from progressive clues - keywords, cast, tagline and a blurred poster - in as few guesses as possible. Data from TMDB.">
<meta name="theme-color" content="#0d0d0d">
<link rel="icon" type="image/png" href="/logo.png">
<link rel="canonical" href="https://cinelinks.vercel.app/cineclue.html">
<meta property="og:type" content="website">
<meta property="og:url" content="https://cinelinks.vercel.app/cineclue.html">
<meta property="og:title" content="CineClue - Guess the daily film">
<meta property="og:description" content="Name the movie from progressive clues in as few guesses as possible. A new film every day.">
<meta property="og:image" content="https://cinelinks.vercel.app/og-image.png">
<meta name="twitter:card" content="summary_large_image">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--s1:#181818;--s2:#222;--bdr:rgba(255,255,255,0.09);--txt:#f0f0f0;--mut:#8d8d8d;--gold:#e8a000;--golddim:rgba(232,160,0,0.15)}
body{font-family:'Inter',-apple-system,sans-serif;background:radial-gradient(circle at 50% -10%,rgba(232,160,0,.08),transparent 34%),linear-gradient(180deg,#101010 0%,var(--bg) 330px);color:var(--txt);min-height:100vh}
#cineBackdrop{position:fixed;inset:0;z-index:-1;background-size:cover;background-position:center;opacity:0;filter:blur(12px) brightness(.6);transform:scale(1.08);transition:opacity 1.6s ease;pointer-events:none}
#cineBackdrop.on{opacity:.1}
.wrap{max-width:540px;margin:0 auto;padding:18px 16px 60px}
.topbar{display:flex;align-items:center;justify-content:flex-end;margin-bottom:18px}
.home-link{display:inline-flex;align-items:center;gap:6px;color:var(--mut);text-decoration:none;font-size:.8rem;font-weight:600}
.home-link:hover{color:var(--gold)}
.date-badge{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);background:var(--golddim);padding:4px 9px;border-radius:999px}
.cl-home{position:fixed;top:13px;left:13px;z-index:50;display:inline-flex;align-items:center;gap:5px;color:var(--mut);text-decoration:none;font-size:.78rem;font-weight:700;background:rgba(20,20,20,.6);border:1px solid var(--bdr);border-radius:999px;padding:7px 13px;backdrop-filter:blur(8px)}
.cl-home:hover{color:var(--gold);border-color:rgba(232,160,0,.45)}
.head{text-align:center;margin-bottom:18px}
.title{font-size:2rem;font-weight:800;letter-spacing:-.02em}
.title span{color:var(--gold)}
.subtitle{color:var(--mut);font-size:.85rem;margin-top:4px}
.pips{display:flex;gap:6px;justify-content:center;margin:16px 0 20px}
.pip{width:26px;height:8px;border-radius:4px;background:rgba(255,255,255,.08);transition:background .2s}
.pip.win{background:#5bbd7a}.pip.wrong{background:#d8503a}.pip.skip{background:#caa23a}.pip.current{background:var(--gold);box-shadow:0 0 8px rgba(232,160,0,.5)}
.clues{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.clue{background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:12px;padding:12px 14px;animation:fadeIn .3s ease both}
.clue-label{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.clue-body{font-size:.95rem;color:var(--txt);line-height:1.5}
.clue-body em{color:var(--mut)}
.clue-chip{display:inline-block;background:rgba(232,160,0,.1);border:1px solid rgba(232,160,0,.25);color:var(--txt);font-size:.82rem;padding:3px 9px;border-radius:999px;margin:0 5px 5px 0}
/* canvas, not <img>: keeps the clean poster URL out of the DOM (no long-press / open-in-tab cheat) */
.clue-poster{width:150px;height:225px;border-radius:8px;display:block;box-shadow:0 12px 30px rgba(0,0,0,.4);pointer-events:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.guessbox{position:relative;margin-bottom:10px}
.guess-input{width:100%;background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:13px 14px;color:var(--txt);font-family:inherit;font-size:.95rem;outline:none}
.guess-input:focus{border-color:rgba(232,160,0,.5)}
.suggest{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--s1);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;z-index:10;max-height:280px;overflow-y:auto;display:none;box-shadow:0 18px 50px rgba(0,0,0,.5)}
.suggest.open{display:block}
.suggest-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--bdr)}
.suggest-item:last-child{border-bottom:none}
.suggest-item:hover,.suggest-item.active{background:rgba(232,160,0,.1)}
.suggest-thumb{width:30px;height:45px;border-radius:4px;object-fit:cover;background:var(--s2);flex-shrink:0}
.suggest-name{font-size:.86rem;font-weight:600}
.suggest-year{font-size:.72rem;color:var(--mut)}
.actions{display:flex;gap:10px}
.btn{flex:1;padding:12px;border-radius:12px;border:1px solid var(--bdr);background:transparent;color:var(--txt);font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;transition:background .15s,border-color .15s,opacity .15s}
.btn:hover{border-color:rgba(232,160,0,.5)}
.btn-gold{background:var(--gold);color:#111;border-color:var(--gold)}
.btn-gold:hover{opacity:.9}
.btn:disabled{opacity:.4;cursor:not-allowed}
.guesses{margin-top:14px;display:flex;flex-direction:column;gap:6px}
.grow{display:flex;align-items:center;gap:8px;font-size:.85rem;padding:8px 12px;border-radius:9px;background:rgba(255,255,255,.03);border:1px solid var(--bdr)}
.grow .gico{flex-shrink:0}
.grow.wrong{color:var(--mut)}
.result{text-align:center;margin-top:8px;background:linear-gradient(180deg,rgba(232,160,0,.08),transparent 140px),var(--s1);border:1px solid rgba(232,160,0,.18);border-radius:14px;padding:24px 18px;box-shadow:0 24px 60px rgba(0,0,0,.35);animation:fadeIn .35s ease both}
.result.hidden{display:none}
.result-poster{width:130px;border-radius:10px;margin:0 auto 14px;display:block;box-shadow:0 16px 36px rgba(0,0,0,.45)}
.result-verdict{font-size:1.3rem;font-weight:800;margin-bottom:2px}
.result-verdict.win{color:#5bbd7a}.result-verdict.lose{color:#d8503a}
.result-film{font-size:1rem;color:var(--txt);font-weight:700}
.result-year{color:var(--mut);font-size:.85rem;margin-bottom:12px}
.result-grid{font-size:1.3rem;letter-spacing:3px;margin:10px 0 4px}
.result-streak{color:var(--mut);font-size:.82rem;margin-bottom:14px}
.result-streak strong{color:var(--gold)}
.result-actions{display:flex;gap:10px}
.loading,.errbox{text-align:center;color:var(--mut);padding:40px 0;font-size:.9rem}
.footer{text-align:center;margin-top:26px;color:var(--mut);font-size:.68rem;opacity:.7}
.footer a{color:var(--mut);text-decoration:none}.footer a:hover{color:var(--gold)}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--s2);border:1px solid var(--bdr);color:var(--txt);padding:10px 16px;border-radius:10px;font-size:.85rem;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:50}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* desktop: use the extra width — bigger visual & roomier column */
@media(min-width:760px){.wrap{max-width:640px}.title{font-size:2.4rem}.subtitle{font-size:.92rem}.clue-poster{width:190px;height:285px}.result-poster{width:160px}.clue-body{font-size:1rem}body{min-height:100vh;display:flex}.wrap{margin:auto}}
</style>
</head>
<body>
<div id="cineBackdrop" aria-hidden="true"></div>
<a href="/" class="cl-home" aria-label="Back to CineLinks">&#8592; CineLinks</a>
<div class="wrap">
  <div class="topbar">
    <span style="display:flex;align-items:center;gap:8px">
      <a class="home-link" id="modeSwitch" href="?practice=1"></a>
      <span class="date-badge" id="dateBadge"></span>
    </span>
  </div>
  <div class="head">
    <div class="title">Cine<span>Clue</span></div>
    <div class="subtitle">Guess the film from the clues. Fewer guesses, better.</div>
  </div>

  <div id="loading" class="loading">Loading today's film…</div>
  <div id="error" class="errbox" style="display:none">Couldn't load today's puzzle. Please try again later.</div>

  <div id="game" style="display:none">
    <div class="pips" id="pips"></div>
    <div class="clues" id="clues"></div>

    <div id="play">
      <div class="guessbox">
        <input class="guess-input" id="guessInput" type="text" autocomplete="off" placeholder="Name the film…">
        <div class="suggest" id="suggest"></div>
      </div>
      <div class="actions">
        <button class="btn" id="skipBtn">Skip clue</button>
        <button class="btn btn-gold" id="guessBtn" disabled>Guess</button>
      </div>
      <div class="guesses" id="guesses"></div>
    </div>

    <div class="result hidden" id="result"></div>
  </div>

  <div class="footer">
    Data &amp; images by <a href="https://www.themoviedb.org/" target="_blank" rel="noopener">TMDB</a>. Not endorsed by TMDB. · <a href="/privacy.html" style="color:inherit">Privacy</a>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="cineclue-pool.js"></script>
<script src="/lib/media.js"></script>
<script src="/lib/pool.js"></script>
<script>
const IMGBASE = 'https://image.tmdb.org/t/p/';
const EPOCH = Math.floor(Date.UTC(2026, 5, 23) / 86400000); // #1 = 2026-06-23
const MAX_GUESSES = 6;

function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function api(path){ return fetch('/api/tmdb?path=' + path).then(r => r.json()); }
function dayNumber(){ const n = new Date(); return Math.floor(Date.UTC(n.getUTCFullYear(), n.getUTCMonth(), n.getUTCDate()) / 86400000); }
function poster(p, size){ return p ? IMGBASE + (size || 'w342') + p : ''; }
function maskTitle(text, title){
  if(!text || !title) return text || '';
  const words = title.split(/\s+/).filter(w => w.length >= 4);
  let out = text;
  for(const w of words){ out = out.replace(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi'), '▒▒▒'); }
  return out;
}
function toast(msg){ const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('show'), 1800); }

// ── State ──────────────────────────────────────────────────────────────────
const DAY = dayNumber();
const PUZZLE = DAY - EPOCH + 1;
const PRACTICE = new URLSearchParams(location.search).get('practice') === '1';
const RAND_START = Math.floor(Math.random() * 100003); // practice: random film
let target = null;        // { id, title, year, posterPath }
let clues = [];           // [{label, html}]
let stage = 0;            // index of highest revealed clue (0-based)
let results = [];         // 'wrong' | 'skip' (per used guess)
let finished = false;
let solved = false;

const STATE_KEY = 'cineclueState';
const STREAK_KEY = 'cineclueStreak';

// ── Daily target (fixed pool) + Practice (endless TMDB Discover pool) ───────
function poolCandidates(base, n){
  const pool = window.CINECLUE_POOL || [];
  const out = [];
  for(let i=0;i<n && pool.length;i++) out.push(Media.parseEntry(pool[(((base+i)%pool.length)+pool.length)%pool.length]));
  return out;
}
async function practiceCandidates(){
  if(window.Pool){
    try{
      const wantTv = Math.random() < 0.25;
      const data = await api(wantTv ? Pool.practiceTv() : Pool.practiceMovie());
      const results = (data && data.results) || [];
      if(results.length){
        const type = wantTv ? 'tv' : 'movie';
        return results.slice().sort(()=>Math.random()-0.5).slice(0,8).map(m=>({type, id:m.id}));
      }
    }catch(_){}
  }
  return poolCandidates(Math.floor(Math.random()*100003), 8);
}
async function loadTarget(){
  const candidates = PRACTICE ? await practiceCandidates() : poolCandidates(DAY, 8);
  if(!candidates.length) throw new Error('empty pool');
  for(const { type, id } of candidates){
    try{
      const [d, kw, cr] = await Promise.all([
        api(Media.detailPath(type, id)),
        api(Media.keywordsPath(type, id)),
        api(Media.creditsPath(type, id))
      ]);
      if(d && d.id && Media.title(d, type)){ return { d, kw, cr, id, type }; }
    }catch(_){}
  }
  throw new Error('could not load any target');
}

function buildClues(t){
  const ttl = Media.title(t.d, t.type);
  const yr = Media.year(t.d, t.type);
  const genres = (t.d.genres || []).map(g => g.name).join(', ');
  const lengthL = Media.lengthLabel(t.d, t.type);
  const kws = (t.kw.keywords || t.kw.results || []).slice(0, 5).map(k => k.name);
  const cast = (t.cr.cast || []).slice(0, 3).map(c => c.name);
  const makers = Media.makers(t.d, t.cr, t.type).join(', ');
  const tagline = t.d.tagline || '';
  const pUrl = poster(t.d.poster_path, 'w342');
  return [
    { label: 'Keywords', html: kws.length ? kws.map(k => '<span class="clue-chip">' + esc(k) + '</span>').join('') : '<span class="clue-body">No keywords on TMDB - here\'s a free one 🙂</span>' },
    { label: Media.mediumLabel(t.type) + ' · Genre · Year', html: '<span class="clue-body">' + esc([Media.mediumLabel(t.type), genres, yr, lengthL].filter(Boolean).join('  ·  ')) + '</span>' },
    { label: makers ? (Media.makerLabel(t.type) + (tagline ? ' · Tagline' : '')) : 'Tagline', html: '<span class="clue-body">' + esc(makers) + (tagline ? ' - <em>"' + esc(maskTitle(tagline, ttl)) + '"</em>' : '') + '</span>' },
    { label: 'Main cast', html: '<span class="clue-body">' + (cast.length ? cast.map(esc).join(', ') : '-') + '</span>' },
    { label: 'Poster (blurred)', html: pUrl ? '<canvas class="clue-poster" width="300" height="450" data-url="' + pUrl + '" data-blur="16"></canvas>' : '<span class="clue-body">No poster</span>' },
    { label: 'Poster', html: pUrl ? '<canvas class="clue-poster" width="300" height="450" data-url="' + pUrl + '" data-blur="5"></canvas>' : '<span class="clue-body">No poster</span>' }
  ];
}

// ── Rendering ──────────────────────────────────────────────────────────────
function renderPips(){
  const el = document.getElementById('pips');
  let h = '';
  for(let i = 0; i < MAX_GUESSES; i++){
    let cls = 'pip';
    if(i < results.length) cls += ' ' + results[i];
    else if(solved && i === results.length) cls += ' win';
    else if(i === results.length && !finished) cls += ' current';
    h += '<div class="' + cls + '"></div>';
  }
  el.innerHTML = h;
}
// Draw a poster onto a canvas with baked-in blur (cover-fit + overscan). The
// canvas never exposes the clean image URL, so long-press / open-in-tab can't cheat.
function coverFit(iw, ih, w, h, over){
  const ir = iw / ih, cr = w / h; let dw, dh;
  if(ir > cr){ dh = h * over; dw = dh * ir; } else { dw = w * over; dh = dw / ir; }
  return { dw, dh, dx: (w - dw) / 2, dy: (h - dh) / 2 };
}
function drawBlurred(canvas, url, blurPx){
  const ctx = canvas.getContext('2d');
  if(!ctx) return;
  const img = new Image();
  img.onload = () => {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    if(blurPx > 0 && typeof ctx.filter !== 'undefined'){
      ctx.filter = 'blur(' + blurPx + 'px)';
      const f = coverFit(img.width, img.height, w, h, 1 + blurPx / 22);
      ctx.drawImage(img, f.dx, f.dy, f.dw, f.dh);
      ctx.filter = 'none';
    } else if(blurPx > 0){
      const scale = Math.max(0.015, 1 / (blurPx * 1.3));
      const tw = Math.max(2, Math.round(w * scale)), th = Math.max(2, Math.round(h * scale));
      const off = document.createElement('canvas'); off.width = tw; off.height = th;
      const octx = off.getContext('2d');
      const fo = coverFit(img.width, img.height, tw, th, 1);
      octx.drawImage(img, fo.dx, fo.dy, fo.dw, fo.dh);
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(off, 0, 0, tw, th, 0, 0, w, h);
    } else {
      const f = coverFit(img.width, img.height, w, h, 1);
      ctx.drawImage(img, f.dx, f.dy, f.dw, f.dh);
    }
  };
  img.onerror = () => {};
  img.src = url;
}
function renderClues(){
  const el = document.getElementById('clues');
  el.innerHTML = clues.slice(0, stage + 1).map(c =>
    '<div class="clue"><div class="clue-label">' + esc(c.label) + '</div>' + c.html + '</div>'
  ).join('');
  el.querySelectorAll('canvas[data-url]').forEach(c => drawBlurred(c, c.dataset.url, +c.dataset.blur));
}
function renderGuesses(){
  const el = document.getElementById('guesses');
  el.innerHTML = results.map(r =>
    '<div class="grow wrong"><span class="gico">' + (r === 'skip' ? '⏭️' : '❌') + '</span>' +
    (r === 'skip' ? 'Skipped a clue' : 'Wrong guess') + '</div>'
  ).join('');
}

// ── Game flow ──────────────────────────────────────────────────────────────
function advance(kind){ // 'wrong' | 'skip'
  results.push(kind);
  if(results.length >= MAX_GUESSES){ finish(false); return; }
  stage = Math.min(stage + 1, clues.length - 1);
  renderPips(); renderClues(); renderGuesses(); save();
}

function makeGuess(movie){
  if(finished) return;
  if(Media.sameTarget(movie, target)){ finish(true); return; }
  toast('Not it - new clue revealed');
  advance('wrong');
}

function skip(){
  if(finished) return;
  advance('skip');
}

function finish(win){
  finished = true; solved = win;
  document.getElementById('play').style.display = 'none';
  if(win){ results = results.concat(['win']); }
  const streak = updateStreak(win);
  renderPips();
  renderResult(streak);
  save();
}

function emojiGrid(){
  // one square per attempt slot
  let g = '';
  let used = 0;
  for(const r of results){
    if(r === 'win'){ g += '🟩'; used++; }
    else if(r === 'skip'){ g += '🟨'; used++; }
    else { g += '🟥'; used++; }
  }
  for(let i = used; i < MAX_GUESSES; i++) g += '⬛';
  return g;
}

function renderResult(streak){
  const el = document.getElementById('result');
  el.classList.remove('hidden');
  if(target.backdropPath){
    el.style.backgroundImage = 'linear-gradient(180deg,rgba(22,22,22,.86),rgba(22,22,22,.97)),url(' + IMGBASE + 'w780' + target.backdropPath + ')';
    el.style.backgroundSize = 'cover'; el.style.backgroundPosition = 'center';
  }
  const verdict = solved
    ? '<div class="result-verdict win">Solved in ' + (solved ? results.indexOf('win') + 1 : MAX_GUESSES) + '!</div>'
    : '<div class="result-verdict lose">Out of guesses</div>';
  const bestPart = streak.best > streak.current ? ' · best <strong>' + streak.best + '</strong>' : '';
  const streakLine = PRACTICE ? '' : '<div class="result-streak">🔥 Streak <strong>' + streak.current + '</strong>' + bestPart + '</div>';
  const actions = PRACTICE
    ? '<button class="btn btn-gold" id="againBtn">New film</button><button class="btn" id="shareBtn">Share</button>'
    : '<button class="btn btn-gold" id="shareBtn">Share</button><a class="btn" href="/" style="display:flex;align-items:center;justify-content:center;text-decoration:none">CineLinks</a>';
  el.innerHTML =
    (target.posterPath ? '<img class="result-poster" src="' + poster(target.posterPath, 'w342') + '" alt="">' : '') +
    verdict +
    '<div class="result-film">' + esc(target.title) + '</div>' +
    '<div class="result-year">' + esc([target.year, target.genres].filter(Boolean).join('  ·  ')) + '</div>' +
    '<div class="result-grid">' + emojiGrid() + '</div>' +
    streakLine +
    '<div class="result-actions">' + actions + '</div>';
  document.getElementById('shareBtn').onclick = share;
  const again = document.getElementById('againBtn');
  if(again) again.onclick = () => { location.href = 'cineclue.html?practice=1&n=' + Date.now(); };
}

function shareText(){
  const n = solved ? (results.indexOf('win') + 1) : 'X';
  const head = PRACTICE ? '🔍 CineClue (Practice)' : ('🔍 CineClue #' + PUZZLE);
  const st = (!PRACTICE && solved) ? loadStreak() : null;
  const streak = (st && st.current > 1) ? '  🔥' + st.current : '';
  return head + '  ' + n + '/' + MAX_GUESSES + streak + '\n' + emojiGrid() + '\nhttps://cinelinks.vercel.app/cineclue.html';
}
function share(){
  const text = shareText();
  if(navigator.share){ navigator.share({ text }).catch(()=>{}); return; }
  if(navigator.clipboard){ navigator.clipboard.writeText(text).then(()=>toast('Copied to clipboard')).catch(()=>toast(text)); }
  else toast('Copy: ' + text);
}

// ── Streak + persistence ───────────────────────────────────────────────────
function loadStreak(){ try{ const s = JSON.parse(localStorage.getItem(STREAK_KEY)); if(s) return { current:s.current|0, best:s.best|0, last:s.last|0 }; }catch(_){} return { current:0, best:0, last:0 }; }
function updateStreak(win){
  if(PRACTICE) return loadStreak(); // practice never touches the streak
  const s = loadStreak();
  if(s.last === DAY) return s; // already counted today
  if(win){ s.current = (s.last === DAY - 1) ? s.current + 1 : 1; s.best = Math.max(s.best, s.current); }
  else { s.current = 0; }
  s.last = DAY;
  try{ localStorage.setItem(STREAK_KEY, JSON.stringify(s)); }catch(_){}
  return s;
}
function save(){ if(PRACTICE) return; const s={ day:DAY, results, stage, finished, solved }; if(finished && target) s.answer={ title:target.title, poster:target.posterPath }; try{ localStorage.setItem(STATE_KEY, JSON.stringify(s)); }catch(_){} }
function restore(){
  if(PRACTICE) return false; // practice is always a fresh game
  try{
    const s = JSON.parse(localStorage.getItem(STATE_KEY));
    if(s && s.day === DAY){ results = s.results || []; stage = s.stage || 0; finished = !!s.finished; solved = !!s.solved; return true; }
  }catch(_){}
  return false;
}

// ── Search autocomplete ────────────────────────────────────────────────────
let suggestItems = [];
let activeIdx = -1;
let searchTimer = null;
function onInput(){
  const q = document.getElementById('guessInput').value.trim();
  document.getElementById('guessBtn').disabled = !q;
  clearTimeout(searchTimer);
  if(q.length < 2){ closeSuggest(); return; }
  searchTimer = setTimeout(() => doSearch(q), 240);
}
async function doSearch(q){
  try{
    const data = await api('search/multi&query=' + encodeURIComponent(q));
    suggestItems = (data.results || []).map(Media.searchMap).filter(Boolean).slice(0, 6);
    renderSuggest();
  }catch(_){ closeSuggest(); }
}
function renderSuggest(){
  const el = document.getElementById('suggest');
  if(!suggestItems.length){ closeSuggest(); return; }
  activeIdx = -1;
  el.innerHTML = suggestItems.map((m, i) =>
    '<div class="suggest-item" data-i="' + i + '">' +
      (m.poster ? '<img class="suggest-thumb" src="' + poster(m.poster, 'w92') + '" alt="">' : '<div class="suggest-thumb"></div>') +
      '<div><div class="suggest-name">' + esc(m.title) + '</div><div class="suggest-year">' + esc([m.year, m.type === 'tv' ? 'TV' : ''].filter(Boolean).join(' · ')) + '</div></div>' +
    '</div>'
  ).join('');
  el.classList.add('open');
  el.querySelectorAll('.suggest-item').forEach(node => {
    node.onclick = () => pick(suggestItems[+node.dataset.i]);
  });
}
function closeSuggest(){ suggestItems = []; activeIdx = -1; document.getElementById('suggest').classList.remove('open'); }
function pick(m){ closeSuggest(); const inp = document.getElementById('guessInput'); inp.value = ''; document.getElementById('guessBtn').disabled = true; makeGuess(m); }

function submitTyped(){
  if(activeIdx >= 0 && suggestItems[activeIdx]){ pick(suggestItems[activeIdx]); return; }
  if(suggestItems.length){ pick(suggestItems[0]); return; }
  toast('Pick a film from the list');
}

// ── Init ───────────────────────────────────────────────────────────────────
function showError(){ document.getElementById('loading').style.display = 'none'; document.getElementById('error').style.display = 'block'; }

async function init(){
  document.getElementById('dateBadge').textContent = PRACTICE ? 'Practice' : ('Daily #' + PUZZLE);
  const sw = document.getElementById('modeSwitch');
  if(sw){ sw.textContent = PRACTICE ? 'Daily →' : 'Practice →'; sw.href = PRACTICE ? 'cineclue.html' : 'cineclue.html?practice=1'; }
  let t;
  try{ t = await loadTarget(); }catch(e){ showError(); return; }
  target = { id: t.d.id, type: t.type, title: Media.title(t.d, t.type), year: Media.year(t.d, t.type), posterPath: t.d.poster_path, backdropPath: t.d.backdrop_path, genres: (t.d.genres || []).slice(0, 3).map(g => g.name).join(' · ') };
  clues = buildClues(t);

  const had = restore();
  if(!had){ stage = 0; results = []; finished = false; solved = false; }
  if(finished && solved && results.indexOf('win') === -1) results.push('win'); // safety for restored solved state

  document.getElementById('loading').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  renderPips(); renderClues(); renderGuesses();

  if(finished){
    document.getElementById('play').style.display = 'none';
    renderResult(loadStreak());
  }

  // wire inputs
  const inp = document.getElementById('guessInput');
  inp.addEventListener('input', onInput);
  inp.addEventListener('keydown', e => {
    if(e.key === 'ArrowDown'){ e.preventDefault(); if(suggestItems.length){ activeIdx = (activeIdx + 1) % suggestItems.length; highlight(); } }
    else if(e.key === 'ArrowUp'){ e.preventDefault(); if(suggestItems.length){ activeIdx = (activeIdx - 1 + suggestItems.length) % suggestItems.length; highlight(); } }
    else if(e.key === 'Enter'){ e.preventDefault(); submitTyped(); }
    else if(e.key === 'Escape'){ closeSuggest(); }
  });
  document.getElementById('guessBtn').onclick = submitTyped;
  document.getElementById('skipBtn').onclick = skip;
  document.addEventListener('click', e => { if(!e.target.closest('.guessbox')) closeSuggest(); });
}
function highlight(){
  document.querySelectorAll('.suggest-item').forEach((n, i) => n.classList.toggle('active', i === activeIdx));
}

init();
</script>
