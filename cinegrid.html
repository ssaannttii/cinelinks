<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineGrid — Fill the cast grid</title>
<meta name="description" content="A daily 3×3 film grid: name a movie that pairs each actor with each other. Instant reveal, build a streak, chase the perfect grid.">
<meta name="theme-color" content="#0d0d0d">
<link rel="icon" type="image/png" href="/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--s1:#181818;--bdr:rgba(255,255,255,.1);--txt:#f0f0f0;--mut:#8d8d8d;--gold:#e8a000;--good:#5bbd7a;--bad:#d8503a}
body{font-family:'Inter',-apple-system,sans-serif;background:radial-gradient(circle at 50% -10%,rgba(232,160,0,.10),transparent 36%),linear-gradient(180deg,#101010,var(--bg) 340px);color:var(--txt);min-height:100vh;display:flex;-webkit-tap-highlight-color:transparent}
.wrap{max-width:520px;margin:auto;padding:26px 16px 70px;width:100%;text-align:center}
.logo{font-size:2rem;font-weight:800;letter-spacing:-.02em}
.logo b{color:var(--gold)}
.tag{color:var(--mut);font-size:.88rem;margin:6px 0 4px}
.kicker{color:var(--gold);font-weight:700;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px}
/* top status bar */
.bar{display:flex;justify-content:center;align-items:center;gap:16px;margin:0 0 8px;color:var(--mut);font-size:.76rem;font-weight:600}
.bar .seg{display:flex;align-items:center;gap:6px}
.bar b{color:var(--txt);font-weight:800;font-size:1rem}
.lives{display:inline-flex;gap:3px;font-size:.95rem;line-height:1}
.lives .hp{transition:transform .3s cubic-bezier(.3,1.4,.5,1),opacity .3s}
.lives .hp.gone{opacity:.25;transform:scale(.8) translateY(1px);filter:grayscale(1)}
.lives .hp.lose{animation:hpLose .5s ease}
@keyframes hpLose{0%{transform:scale(1.5);filter:none}40%{transform:scale(1.5) rotate(8deg)}100%{transform:scale(.8);opacity:.25;filter:grayscale(1)}}
/* progress bar */
.prog{position:relative;height:6px;border-radius:99px;background:rgba(255,255,255,.07);max-width:430px;margin:0 auto 6px;overflow:hidden}
.prog>i{position:absolute;left:0;top:0;bottom:0;width:0;border-radius:99px;background:linear-gradient(90deg,var(--gold),#ffd36b);transition:width .55s cubic-bezier(.3,1,.3,1);box-shadow:0 0 12px rgba(232,160,0,.5)}
.prog.win>i{background:linear-gradient(90deg,var(--good),#9be8b4)}
.rowfb{color:var(--mut);font-size:.72rem;margin:2px 0 10px;min-height:14px}
/* combo pill */
.combo{display:inline-flex;align-items:center;gap:5px;font-weight:800;font-size:.78rem;color:var(--gold);background:rgba(232,160,0,.12);border:1px solid rgba(232,160,0,.32);border-radius:99px;padding:3px 10px;opacity:0;transform:translateY(4px) scale(.9);transition:opacity .25s,transform .25s}
.combo.show{opacity:1;transform:none;animation:comboPulse .5s ease}
@keyframes comboPulse{0%{transform:scale(.6) rotate(-6deg)}55%{transform:scale(1.18)}100%{transform:scale(1)}}
.grid{display:grid;grid-template-columns:62px 1fr 1fr 1fr;gap:5px;max-width:430px;margin:0 auto}
.corner{border-radius:8px}
.hdr{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:4px 2px;text-align:center}
.hdr img{width:42px;height:42px;border-radius:50%;object-fit:cover;background:#2a2a2a;border:1px solid var(--bdr)}
.hdr.row img{width:38px;height:38px}
.hdr .hn{font-size:.56rem;font-weight:700;line-height:1.1;color:var(--txt);max-width:78px}
.cell{aspect-ratio:1;border-radius:9px;border:1px solid var(--bdr);background:var(--s1);position:relative;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s,transform .15s,box-shadow .3s}
.cell:not(.correct):not(.checking):active{transform:scale(.96)}
.cell:hover{border-color:rgba(232,160,0,.45)}
.cell .plus{color:#3a3a3a;font-size:1.6rem;font-weight:300;transition:color .15s}
.cell:hover .plus{color:rgba(232,160,0,.6)}
.cell img{width:100%;height:100%;object-fit:cover}
.cell .ct{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(0,0,0,.85));color:#fff;font-size:.52rem;font-weight:600;padding:10px 3px 3px;line-height:1.15;max-height:72%;overflow:hidden}
.cell.checking{border-color:rgba(232,160,0,.55)}
.cell.checking::after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.22) 50%,transparent 70%);background-size:220% 100%;animation:scan .8s linear infinite}
@keyframes scan{0%{background-position:160% 0}100%{background-position:-60% 0}}
.cell.wrong{border-color:var(--bad);box-shadow:0 0 0 2px rgba(216,80,58,.35)}
.cell.wrong img{filter:grayscale(.6) brightness(.7)}
.cell.correct{border-color:var(--good);cursor:default;box-shadow:0 0 0 2px rgba(91,189,122,.45),0 10px 30px rgba(91,189,122,.18)}
.cell.correct.rare{border-color:#ffd36b;box-shadow:0 0 0 2px rgba(255,211,107,.6),0 10px 34px rgba(232,160,0,.32)}
.cell.correct.rare::before{content:"";position:absolute;inset:0;background:linear-gradient(125deg,transparent 38%,rgba(255,255,255,.5) 50%,transparent 62%);background-size:260% 100%;animation:sheen 1.4s ease forwards;pointer-events:none}
@keyframes sheen{0%{background-position:150% 0}100%{background-position:-90% 0}}
.cell .mk{position:absolute;top:3px;right:4px;font-size:.95rem;font-weight:800;text-shadow:0 1px 3px #000}
.cell.correct .mk{color:#7fd49a;animation:stamp .45s cubic-bezier(.3,1.5,.5,1) both}
.cell.wrong .mk{color:#e8806f;animation:stamp .35s ease both}
@keyframes stamp{0%{transform:scale(2.4) rotate(-14deg);opacity:0}60%{transform:scale(.85) rotate(4deg);opacity:1}100%{transform:scale(1) rotate(0)}}
.cell.reveal img{animation:flipIn .5s cubic-bezier(.25,1,.3,1) both}
@keyframes flipIn{0%{transform:rotateY(82deg) scale(.9);opacity:.2}100%{transform:none;opacity:1}}
.cell.win-wave{animation:winWave .6s ease}
@keyframes winWave{0%,100%{transform:none}40%{transform:translateY(-9px) scale(1.05)}}
/* floating label that rises off a cell */
.floatlbl{position:fixed;z-index:60;pointer-events:none;font-weight:900;font-size:.82rem;letter-spacing:.01em;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.6);white-space:nowrap;transform:translate(-50%,-50%);animation:floatUp 1.1s cubic-bezier(.2,.8,.3,1) forwards}
.floatlbl.gold{color:#ffd36b}
.floatlbl.green{color:#9be8b4}
@keyframes floatUp{0%{opacity:0;transform:translate(-50%,-30%) scale(.7)}20%{opacity:1;transform:translate(-50%,-90%) scale(1.05)}100%{opacity:0;transform:translate(-50%,-220%) scale(1)}}
/* search modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-start;justify-content:center;z-index:20;padding:56px 16px 16px;backdrop-filter:blur(2px)}
.modal.open{display:flex;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{width:100%;max-width:420px;background:#1a1a1a;border:1px solid var(--bdr);border-radius:14px;padding:16px;box-shadow:0 24px 70px rgba(0,0,0,.6);animation:sheetIn .26s cubic-bezier(.2,.9,.25,1)}
@keyframes sheetIn{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.sheet h3{font-size:.9rem;font-weight:700;margin-bottom:3px}
.sheet .pair{color:var(--gold);font-size:.82rem;font-weight:700;margin-bottom:12px}
.sheet .pair img{width:22px;height:22px;border-radius:50%;object-fit:cover;vertical-align:middle;margin:0 1px;border:1px solid var(--bdr)}
.sheet input{width:100%;padding:12px 14px;border-radius:11px;border:1px solid var(--bdr);background:rgba(255,255,255,.05);color:var(--txt);font-family:inherit;font-size:.95rem;outline:none}
.sheet input:focus{border-color:rgba(232,160,0,.55)}
.results{margin-top:8px;max-height:44vh;overflow:auto;text-align:left}
.ritem{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:9px;cursor:pointer;transition:background .12s}
.ritem:hover,.ritem.kbd{background:rgba(232,160,0,.12)}
.ritem:active{background:rgba(232,160,0,.2)}
.ritem img{width:34px;height:51px;object-fit:cover;border-radius:5px;background:#333;flex-shrink:0}
.ritem .rt{font-weight:600;font-size:.85rem}
.ritem .ry{color:var(--mut);font-size:.72rem}
.mfeed{min-height:18px;color:var(--mut);font-size:.78rem;margin-top:8px}
.mbtns{display:flex;gap:8px;margin-top:10px}
.mbtns button{flex:1;padding:9px;border-radius:10px;border:1px solid var(--bdr);background:transparent;color:var(--mut);font-family:inherit;font-weight:700;cursor:pointer;font-size:.82rem}
#mHint{border-color:rgba(232,160,0,.4);color:var(--gold)}
.result{margin-top:18px;padding:16px;border-radius:14px;border:1px solid var(--bdr);background:rgba(255,255,255,.04);display:none}
.result.show{display:block;animation:fxFadeUp .5s cubic-bezier(.2,.8,.2,1) both}
.result h2{font-size:1.45rem;margin-bottom:6px}
.result h2.win{color:var(--good)}
.result .sub{color:var(--mut);font-size:.82rem;margin-bottom:2px}
.stats{display:flex;gap:16px;justify-content:center;margin:14px 0 4px}
.stat{display:flex;flex-direction:column;align-items:center;gap:1px;font-size:.58rem;color:var(--mut);text-transform:uppercase;letter-spacing:.05em}
.stat b{font-size:1.3rem;color:var(--txt);font-weight:800}
.row-btns{display:flex;gap:8px;max-width:380px;margin:14px auto 0}
.btn{flex:1;padding:12px;border-radius:11px;border:1px solid var(--bdr);background:transparent;color:var(--txt);font-family:inherit;font-weight:700;font-size:.85rem;cursor:pointer;transition:transform .09s ease}
.btn:active{transform:scale(.96)}
.btn.gold{background:var(--gold);color:#111;border-color:var(--gold)}
.btn:disabled{opacity:.4;cursor:default}
.loading{color:var(--mut);font-size:.9rem;padding:40px 0}
.foot{margin-top:24px;color:var(--mut);font-size:.74rem}
.foot a{color:var(--gold);text-decoration:none}
.hint{color:var(--mut);font-size:.78rem;margin:2px 0 14px}
.cl-home{position:fixed;top:13px;left:13px;z-index:50;display:inline-flex;align-items:center;gap:5px;color:var(--mut);text-decoration:none;font-size:.78rem;font-weight:700;background:rgba(20,20,20,.6);border:1px solid var(--bdr);border-radius:999px;padding:7px 13px;backdrop-filter:blur(8px)}
.cl-home:hover{color:var(--gold);border-color:rgba(232,160,0,.45)}
.snd{position:fixed;top:13px;right:13px;z-index:50;width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;color:var(--mut);font-size:1rem;background:rgba(20,20,20,.6);border:1px solid var(--bdr);border-radius:999px;backdrop-filter:blur(8px);cursor:pointer}
.snd:hover{color:var(--gold);border-color:rgba(232,160,0,.45)}
@media(min-width:760px){.wrap{max-width:600px}.logo{font-size:2.5rem}.tag{font-size:1rem}.kicker{font-size:.78rem}.grid{max-width:540px;grid-template-columns:84px 1fr 1fr 1fr;gap:7px}.hdr img{width:54px;height:54px}.hdr.row img{width:50px;height:50px}.hdr .hn{font-size:.66rem;max-width:104px}.hint{font-size:.92rem}.bar{font-size:.86rem}.prog,.grid{max-width:540px}}
</style>
<link rel="stylesheet" href="/fx.css">
</head>
<body>
<a href="/" class="cl-home" aria-label="Back to CineLinks">← CineLinks</a>
<button class="snd" id="sndBtn" aria-label="Toggle sound" title="Sound">🔊</button>
<div class="wrap" id="cinegrid-app">
  <div class="logo">Cine<b>Grid</b></div>
  <div class="tag">Name a film that pairs each actor</div>
  <div class="kicker" id="modeLbl">Daily</div>
  <div id="stage"><div class="loading" style="padding:4px 0" aria-label="Building grid">
    <div class="grid" style="pointer-events:none">
      <span class="fx-skel" style="height:64px"></span><span class="fx-skel" style="height:64px"></span><span class="fx-skel" style="height:64px"></span><span class="fx-skel" style="height:64px"></span><span class="fx-skel" style="height:64px"></span><span class="fx-skel" style="height:64px"></span><span class="fx-skel" style="height:64px"></span><span class="fx-skel" style="height:64px"></span><span class="fx-skel" style="height:64px"></span><span class="fx-skel" style="height:64px"></span><span class="fx-skel" style="height:64px"></span><span class="fx-skel" style="height:64px"></span><span class="fx-skel" style="height:64px"></span><span class="fx-skel" style="height:64px"></span><span class="fx-skel" style="height:64px"></span><span class="fx-skel" style="height:64px"></span>
    </div>
  </div></div>
  <div class="foot">Posters &amp; data from TMDB · part of <a href="/">CineLinks</a></div>
</div>
<div class="modal" id="modal"><div class="sheet">
  <h3>Name a film</h3><div class="pair" id="mPair"></div>
  <input id="mInput" type="text" autocomplete="off" placeholder="Search any movie…">
  <div class="results" id="mResults"></div>
  <div class="mfeed" id="mFeed"></div>
  <div class="mbtns"><button id="mHint">💡 Stuck? Show options</button><button id="mClose">Cancel</button></div>
</div></div>
<script src="/fx.js"></script>
<script>
(function(){
  const IMG='https://image.tmdb.org/t/p/';
  const LIVES=5; // wrong guesses you can afford before the grid ends
  // Generation pool: well-connected leads. Grids are built live from a 3×3 biclique
  // over their co-star graph (every row×col pair shares a film), so every daily is
  // solvable by construction. NAMES doubles as the name lookup for any cell.
  const NAMES={31:"Tom Hanks",192:"Morgan Freeman",287:"Brad Pitt",380:"Robert De Niro",500:"Tom Cruise",1245:"Scarlett Johansson",1813:"Anne Hathaway",1892:"Matt Damon",2227:"Nicole Kidman",2231:"Samuel L. Jackson",3223:"Robert Downey Jr.",5081:"Emily Blunt",5292:"Denzel Washington",6193:"Leonardo DiCaprio",6384:"Keanu Reeves",6885:"Charlize Theron",12835:"Vin Diesel",16483:"Sylvester Stallone",18277:"Sandra Bullock",18918:"Dwayne Johnson",73457:"Chris Pratt",117642:"Jason Momoa",234352:"Margot Robbie",54693:"Emma Stone",30614:"Ryan Gosling",2037:"Cillian Murphy",524:"Natalie Portman",505710:"Zendaya",18897:"Jackie Chan",1136406:"Tom Holland",71580:"Benedict Cumberbatch",10882:"Rosamund Pike",224513:"Ana de Armas",3894:"Christian Bale",85:"Johnny Depp",1532:"Bill Murray",131:"Jake Gyllenhaal"};
  const POOL_IDS=Object.keys(NAMES).map(Number);
  const GRIDS=[[[2231,2227,31],[6885,500,380]],[[5081,2231,1813],[73457,18918,1892]],[[1245,287,31],[6384,1892,2231]],[[73457,31,380],[16483,287,1245]],[[287,6193,6384],[500,2231,1892]],[[2227,287,31],[2231,380,16483]],[[12835,5081,2227],[1892,6885,16483]],[[287,2227,31],[380,234352,6384]],[[2231,6384,1245],[16483,287,31]],[[31,117642,380],[16483,6384,192]],[[3223,1245,380],[2231,6384,1892]],[[6384,192,2231],[287,31,5292]],[[1892,31,380],[500,6193,192]],[[73457,1892,287],[1245,2231,16483]],[[1245,1892,6193],[6384,16483,380]],[[287,234352,2227],[16483,2231,380]],[[500,31,192],[380,1892,287]],[[192,500,2231],[380,31,287]],[[500,31,192],[1245,6384,1892]],[[287,2231,6384],[1892,500,18277]],[[1892,73457,380],[1245,1813,287]],[[6885,2231,6384],[6193,380,18918]]];

  const stage=document.getElementById('stage');
  const isDaily=!/[?&]practice=1/.test(location.search);
  document.getElementById('modeLbl').textContent=isDaily?'Daily':'Practice';
  function api(p){return fetch('/api/tmdb?path='+p+'&language=en-US').then(r=>r.json());}
  function utcDay(){const n=new Date();return Math.floor(Date.UTC(n.getUTCFullYear(),n.getUTCMonth(),n.getUTCDate())/864e5);}
  function loadState(){try{return JSON.parse(localStorage.getItem('cinegridState'));}catch(_){return null;}}
  function saveState(o){try{localStorage.setItem('cinegridState',JSON.stringify(o));}catch(_){}}
  function rarityOf(v){const f=Math.min(1,Math.log10((v||0)+10)/Math.log10(40000));return Math.max(1,Math.round(100-100*f));}
  function esc(s){return (s||'').replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];});}
  const sfx=function(name,arg){try{if(window.Sfx&&Sfx[name])Sfx[name](arg);}catch(_){}};
  const haptic=function(p){try{if(window.Sfx&&Sfx.haptic)Sfx.haptic(p);}catch(_){}};
  function wait(ms){return new Promise(function(r){setTimeout(r,ms);});}

  let GRID=null, photos={}, cells=[null,null,null,null,null,null,null,null,null], livesLeft=LIVES, over=false, won=false, openIdx=-1, busy=false, rowFb=null, creditsCache={}, flashCells={}, triedByCell={}, combo=0, bestCombo=0, guesses=0;

  // ── live grid generation (3×3 biclique over the co-star graph) ──
  function hash(s){s=''+s;let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h+s.charCodeAt(i))|0;return h>>>0;}
  function rnd(seed,i){let x=(hash(seed)^Math.imul(i+1,0x9E3779B1))>>>0;x=Math.imul(x^(x>>>15),0x85EBCA6B)>>>0;x=Math.imul(x^(x>>>13),0xC2B2AE35)>>>0;return(x^(x>>>16))>>>0;}
  function order(arr,seed){return arr.map(function(x,i){return [x,rnd(seed,i)];}).sort(function(a,b){return a[1]-b[1];}).map(function(p){return p[0];});}
  function combos3(arr){var res=[],n=arr.length;for(var i=0;i<n;i++)for(var j=i+1;j<n;j++)for(var k=j+1;k<n;k++)res.push([arr[i],arr[j],arr[k]]);return res;}
  const filmCache={};
  async function filmsOf(id){ if(filmCache[id])return filmCache[id]; const d=await api('person/'+id+'/combined_credits'); filmCache[id]=new Set((d.cast||[]).filter(function(x){return x.media_type==='movie'&&(x.vote_count||0)>=800&&x.poster_path;}).map(function(x){return x.id;})); return filmCache[id]; }
  function share(a,b){ const A=filmCache[a],B=filmCache[b]; if(!A||!B)return false; for(const x of A) if(B.has(x))return true; return false; }
  function findGrid(cands,seed){
    const adj={}; cands.forEach(function(a){ adj[a]=new Set(cands.filter(function(b){return b!==a&&share(a,b);})); });
    const rows=order(combos3(cands),'r'+seed);
    for(const R of rows){
      const common=[...adj[R[0]]].filter(function(x){return adj[R[1]].has(x)&&adj[R[2]].has(x)&&R.indexOf(x)<0;});
      if(common.length>=3) return [R, order(common,'c'+seed).slice(0,3)];
    }
    return null;
  }
  async function generateGrid(seed){
    for(let k=0;k<3;k++){
      const cands=order(POOL_IDS,'g'+seed+'_'+k).slice(0,20);
      await Promise.all(cands.map(filmsOf));
      const g=findGrid(cands, seed+'_'+k);
      if(g) return g;
    }
    return GRIDS[((seed%GRIDS.length)+GRIDS.length)%GRIDS.length];   // fallback to a baked board
  }
  function loadGrid(){ try{return JSON.parse(localStorage.getItem('cinegridGrid'));}catch(_){return null;} }
  function saveGrid(o){ try{localStorage.setItem('cinegridGrid',JSON.stringify(o));}catch(_){} }
  function cellPair(idx){ const r=Math.floor(idx/3), c=idx%3; return { rid:GRID[0][r], cid:GRID[1][c] }; }
  function face(id){ return photos[id] ? IMG+'w185'+photos[id] : '/logo.png'; }
  function correctCount(){ return cells.filter(function(c){return c&&c.status==='correct';}).length; }
  function rareTier(v){ const r=rarityOf(v); if(r>=58)return 'elite'; if(r>=38)return 'rare'; return ''; }

  function render(){
    const cc=correctCount();
    let hearts=''; for(let i=0;i<LIVES;i++){ hearts+='<span class="hp'+(i>=livesLeft?' gone':'')+'" data-h="'+i+'">❤️</span>'; }
    let html='<div class="bar">'+
      '<span class="seg">Correct <b>'+cc+'/9</b></span>'+
      '<span class="seg">Lives <span class="lives" id="lives">'+hearts+'</span></span>'+
      '</div>';
    html+='<div class="prog'+(cc===9?' win':'')+'"><i style="width:'+(cc/9*100)+'%"></i></div>';
    html+='<div class="rowfb">'+(rowFb?('Per row — '+rowFb.join(' · ')):(!over?'Tap a square, name a film both actors are in.':''))+
      ' <span class="combo'+(combo>=2&&!over?' show':'')+'" id="combo">🔥 '+combo+' streak</span></div>';
    html+='<div class="grid">';
    html+='<div class="corner"></div>';
    GRID[1].forEach(function(id){ html+='<div class="hdr col"><img src="'+face(id)+'" alt=""><span class="hn">'+NAMES[id]+'</span></div>'; });
    for(let r=0;r<3;r++){
      html+='<div class="hdr row"><img src="'+face(GRID[0][r])+'" alt=""><span class="hn">'+NAMES[GRID[0][r]]+'</span></div>';
      for(let c=0;c<3;c++){ const idx=r*3+c, cell=cells[idx];
        if(cell){ const st=cell.status; const mk=st==='correct'?'✓':(st==='wrong'?'✕':'');
          const rare=st==='correct'&&rareTier(cell.votes)?' rare':'';
          html+='<div class="cell '+st+rare+(over?' over':'')+'" data-i="'+idx+'"><img src="'+IMG+'w185'+cell.poster+'" alt=""><span class="ct">'+esc(cell.title)+'</span>'+(mk?'<span class="mk">'+mk+'</span>':'')+'</div>';
        } else html+='<div class="cell'+(over?' over':'')+'" data-i="'+idx+'"><span class="plus">+</span></div>';
      }
    }
    html+='</div>';
    html+='<div class="result'+(over?' show':'')+'" id="result"></div>';
    stage.innerHTML=html;
    // play any queued cell animations
    Object.keys(flashCells).forEach(function(i){ const el=stage.querySelector('.cell[data-i="'+i+'"]'); if(el&&window.Fx) Fx.play(el,'fx-'+flashCells[i],700); });
    flashCells={};
    if(!over){
      stage.querySelectorAll('.cell[data-i]').forEach(function(el){ const i=+el.dataset.i; if(cells[i]&&(cells[i].status==='correct'||cells[i].status==='checking'))return; el.onclick=function(){ openCell(i); }; });
    } else renderResult();
  }

  // a number/label that floats up off a cell element
  function floatOff(idx,text,cls){
    const el=stage.querySelector('.cell[data-i="'+idx+'"]'); if(!el)return;
    if(window.Fx&&Fx.reduced&&Fx.reduced())return;
    const r=el.getBoundingClientRect(); const n=document.createElement('div');
    n.className='floatlbl '+(cls||''); n.textContent=text;
    n.style.left=(r.left+r.width/2)+'px'; n.style.top=(r.top+r.height*0.42)+'px';
    document.body.appendChild(n); setTimeout(function(){n.remove();},1200);
  }

  // ── choosing a film for a cell ──
  const modal=document.getElementById('modal'), mInput=document.getElementById('mInput'), mResults=document.getElementById('mResults'), mFeed=document.getElementById('mFeed'), mPair=document.getElementById('mPair');
  document.getElementById('mClose').onclick=closeModal;
  document.getElementById('mHint').onclick=hint;
  function openCell(idx){ if(over||busy||(cells[idx]&&cells[idx].status==='correct')) return; sfx('tap'); haptic(6); openIdx=idx; const p=cellPair(idx);
    mPair.innerHTML='<img src="'+face(p.rid)+'" alt="">'+NAMES[p.rid]+'  ×  <img src="'+face(p.cid)+'" alt="">'+NAMES[p.cid];
    mInput.value=''; mResults.innerHTML=''; mFeed.textContent=''; kbdIdx=-1; modal.classList.add('open'); setTimeout(function(){mInput.focus();},30); }
  function closeModal(){ modal.classList.remove('open'); openIdx=-1; }
  let lk; mInput.addEventListener('input',function(){ clearTimeout(lk); kbdIdx=-1; lk=setTimeout(search,240); });
  let kbdIdx=-1;
  mInput.addEventListener('keydown',function(e){
    const items=mResults.querySelectorAll('.ritem'); if(!items.length)return;
    if(e.key==='ArrowDown'){ e.preventDefault(); kbdIdx=Math.min(items.length-1,kbdIdx+1); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); kbdIdx=Math.max(0,kbdIdx-1); }
    else if(e.key==='Enter'){ e.preventDefault(); const t=items[kbdIdx<0?0:kbdIdx]; if(t)t.click(); return; }
    else return;
    items.forEach(function(el,i){ el.classList.toggle('kbd',i===kbdIdx); }); if(items[kbdIdx])items[kbdIdx].scrollIntoView({block:'nearest'});
  });
  function rowItems(list){ return list.map(function(m){ return '<div class="ritem" data-id="'+m.id+'" data-p="'+m.poster_path+'" data-t="'+esc(m.title||m.name)+'" data-v="'+(m.vote_count||0)+'"><img src="'+IMG+'w92'+m.poster_path+'" alt=""><div><div class="rt">'+esc(m.title||m.name)+'</div><div class="ry">'+((m.release_date||m.first_air_date||'').slice(0,4))+'</div></div></div>'; }).join(''); }
  function wireItems(){ mResults.querySelectorAll('.ritem').forEach(function(el){ el.onclick=function(){ choose(el.dataset); }; }); }
  function search(){
    const q=mInput.value.trim(); if(q.length<2){ mResults.innerHTML=''; return; }
    const tried=triedByCell[openIdx]||new Set();
    api('search/multi&query='+encodeURIComponent(q)).then(function(r){
      const items=(r.results||[]).filter(function(x){return x.media_type==='movie'&&x.poster_path&&!tried.has(x.id);}).slice(0,8);
      mResults.innerHTML=rowItems(items); wireItems();
    });
  }
  // Hint: a few options where ONLY ONE pairs both actors; the rest have just one of them.
  function hint(){
    if(openIdx<0) return; sfx('tap');
    const p=cellPair(openIdx); mFeed.textContent='Loading options…';
    const tried=triedByCell[openIdx]||new Set();
    Promise.all([api('person/'+p.rid+'/combined_credits'),api('person/'+p.cid+'/combined_credits')]).then(function(a){
      const A=(a[0].cast||[]).filter(function(c){return c.media_type==='movie'&&c.poster_path&&(c.vote_count||0)>=300&&!tried.has(c.id);});
      const B=(a[1].cast||[]).filter(function(c){return c.media_type==='movie'&&c.poster_path&&(c.vote_count||0)>=300&&!tried.has(c.id);});
      const bIds=new Set(B.map(function(c){return c.id;})), aIds=new Set(A.map(function(c){return c.id;}));
      const shared=A.filter(function(c){return bIds.has(c.id);}).sort(function(x,y){return (y.vote_count||0)-(x.vote_count||0);});
      const onlyA=A.filter(function(c){return !bIds.has(c.id);});
      const onlyB=B.filter(function(c){return !aIds.has(c.id);});
      function sample(arr,n){ return arr.slice().sort(function(){return Math.random()-0.5;}).slice(0,n); }
      const opts=[];
      if(shared.length) opts.push(shared[Math.floor(Math.random()*Math.min(3,shared.length))]); // the one real answer
      sample(onlyA,3).forEach(function(o){opts.push(o);}); // decoys → less of a giveaway
      sample(onlyB,3).forEach(function(o){opts.push(o);});
      const seen=new Set(); const final=opts.filter(function(o){ if(!o||seen.has(o.id))return false; seen.add(o.id); return true; }).sort(function(){return Math.random()-0.5;});
      mFeed.textContent=shared.length?'Only ONE of these has both actors — pick it.':'Hmm, no easy shared title — try searching.';
      mResults.innerHTML=rowItems(final); wireItems();
    }).catch(function(){ mFeed.textContent='Couldn’t load options, try again.'; });
  }

  function creditsOf(mid){ return creditsCache[mid] ? Promise.resolve(creditsCache[mid]) : api('movie/'+mid+'/credits').then(function(cr){ const s=new Set((cr.cast||[]).map(function(c){return c.id;})); creditsCache[mid]=s; return s; }); }

  // pick a film → place it, then reveal-verify instantly
  async function choose(d){
    if(openIdx<0||busy) return;
    const idx=openIdx, p=cellPair(idx);
    busy=true; closeModal();
    cells[idx]={movieId:+d.id,poster:d.p,title:d.t,votes:+d.v,status:'checking'};
    flashCells[idx]='reveal'; sfx('cardFlip'); haptic(8); render();
    const cellEl=stage.querySelector('.cell[data-i="'+idx+'"]'); if(cellEl)cellEl.classList.add('reveal');
    const res=await Promise.all([creditsOf(+d.id), wait(620)]); // suspense beat
    const ids=res[0], ok=ids.has(p.rid)&&ids.has(p.cid);
    guesses++;
    if(ok){
      cells[idx].status='correct'; combo++; bestCombo=Math.max(bestCombo,combo);
      const tier=rareTier(d.v);
      flashCells[idx]='bounce'; render();
      const el=stage.querySelector('.cell[data-i="'+idx+'"]');
      if(tier==='elite'){ sfx('reveal','elite'); if(window.Fx)Fx.burstFrom(el,{count:30,power:.9}); floatOff(idx,'💎 Deep cut!','gold'); }
      else if(tier==='rare'){ sfx('reveal','rare'); floatOff(idx,'✨ Nice pull','gold'); }
      else if(combo>=2){ sfx('streak',combo); floatOff(idx,'🔥 '+combo+'!','green'); }
      else { sfx('goalReach'); }
      haptic(combo>=3?[10,20,10]:14);
      rowFb=rowFeedback();
      if(correctCount()===9){ finish(true); busy=false; return; }
      busy=false; render();
    } else {
      cells[idx].status='wrong'; (triedByCell[idx]=triedByCell[idx]||new Set()).add(+d.id);
      const wasLives=livesLeft; livesLeft--; combo=0;
      flashCells[idx]='shake'; sfx('deadEnd'); haptic([14,40,14]); render();
      const hp=stage.querySelector('.hp[data-h="'+(wasLives-1)+'"]'); if(hp&&window.Fx)Fx.play(hp,'lose',500);
      floatOff(idx,'✕ Not a match','');
      await wait(720);
      cells[idx]=null; rowFb=rowFeedback();
      if(livesLeft<=0){ finish(false); busy=false; return; }
      busy=false; render();
    }
  }
  function rowFeedback(){ return [0,1,2].map(function(r){ let c=0; for(let k=0;k<3;k++){ const cell=cells[r*3+k]; if(cell&&cell.status==='correct')c++; } return c+'/3'; }); }

  function finish(win){
    over=true; won=win;
    if(isDaily) persist();
    // Daily win → collect every film you proved (path-like commons); the rarest find
    // (fewest votes) is the prize card, bumped by how many lives survived.
    try{
      if(win && isDaily && window.Collection){
        const corr=cells.filter(function(c){return c&&c.status==='correct'&&c.movieId;});
        let prize=null; corr.forEach(function(c){ if(!prize||(+c.votes||1e9)<(+prize.votes||1e9)) prize=c; });
        const bump=livesLeft>=5?2:livesLeft>=4?1:0;
        const nc=Collection.add(corr.map(function(c){
          const it={id:c.movieId,type:'movie',name:c.title,img:c.poster};
          if(prize&&c.movieId===prize.movieId){ it.rarityFloor='rare'; if(bump) it.bump=bump; }
          return it;
        }));
        if(nc&&nc.length){
          try{ const w=JSON.parse(localStorage.getItem('clCardWins')||'[]'); if(w.indexOf('grid')<0){ w.push('grid'); localStorage.setItem('clCardWins',JSON.stringify(w)); } }catch(_e){}
          if(Collection.reveal) setTimeout(function(){ Collection.reveal(nc); },900);
        }
      }
    }catch(_){ /* collection is optional */ }
    render();
    const cells9=stage.querySelectorAll('.cell');
    if(win){
      if(window.Fx){ setTimeout(function(){Fx.confetti({count:130,power:1.1});},150); setTimeout(function(){Fx.confetti({count:90,power:.9});},650); }
      // grid wave
      stage.querySelectorAll('.cell.correct').forEach(function(el,i){ setTimeout(function(){ if(window.Fx)Fx.play(el,'win-wave',600); },120+i*70); });
      sfx('allDone'); haptic([20,40,20,40,30]);
    } else {
      sfx('select'); haptic(20); // soft close on running out of lives
    }
  }

  function persist(){ saveState({day:utcDay(),finished:true,won:won,filled:correctCount(),lives:livesLeft,best:bestCombo,cells:cells,grid:GRID}); }

  function renderResult(){
    const filled=correctCount();
    const corr=cells.filter(function(c){return c&&c.status==='correct';});
    const rar=corr.length?Math.round(corr.reduce(function(s,c){return s+rarityOf(c.votes);},0)/corr.length):0;
    const win=filled===9;
    const dayN=utcDay()-Math.floor(Date.UTC(2026,0,1)/864e5);
    let sq=''; for(let i=0;i<9;i++){ sq+=(cells[i]&&cells[i].status==='correct')?'🟩':'⬛'; if(i%3===2&&i<8)sq+='\n'; }
    const headline=win?'Perfect grid! 🎯':(filled>=6?'Solid! '+filled+'/9':(filled>=3?filled+'/9 — close':filled+'/9'));
    const shareText='🎬 CineGrid'+(isDaily?' #'+dayN:'')+'\n'+sq+'\n'+filled+'/9'+(bestCombo>=2?' · 🔥'+bestCombo+' streak':'')+' · rarity '+rar+'\nhttps://cinelinks.vercel.app/cinegrid.html';
    document.getElementById('result').innerHTML=
      '<h2 class="'+(win?'win':'')+'">'+headline+'</h2>'+
      '<div class="sub">'+(win?'Every square. Flawless.':(filled?'Nice work — replay to chase 9/9.':'Tough board — give Practice a spin.'))+'</div>'+
      '<div class="stats"><div class="stat"><b id="rsFilled">0/9</b>correct</div><div class="stat"><b id="rsBest">0</b>best streak</div><div class="stat"><b id="rsRar">0</b>rarity</div></div>'+
      '<div class="row-btns"><button class="btn" id="shareBtn">Share</button><button class="btn gold" id="again">'+(isDaily?'Practice grid':'New grid')+'</button></div>';
    if(window.Fx&&Fx.countUp){ Fx.countUp(document.getElementById('rsFilled'),filled,{suffix:'/9',ms:650}); Fx.countUp(document.getElementById('rsBest'),bestCombo,{ms:700}); Fx.countUp(document.getElementById('rsRar'),rar,{ms:850}); }
    document.getElementById('again').onclick=function(){ sfx('tap'); location.href='/cinegrid.html'+(isDaily?'?practice=1':'?practice=1&r='+Date.now()); };
    document.getElementById('shareBtn').onclick=function(){ sfx('tap'); if(navigator.share){navigator.share({text:shareText}).catch(function(){});} else { try{navigator.clipboard.writeText(shareText);}catch(_){ } const b=document.getElementById('shareBtn'); b.textContent='Copied ✓'; } };
  }

  // ── sound toggle ──
  const sndBtn=document.getElementById('sndBtn');
  function paintSnd(){ try{ sndBtn.textContent=(window.Sfx&&Sfx.enabled)?'🔊':'🔇'; }catch(_){ sndBtn.textContent='🔊'; } }
  sndBtn.onclick=function(){ try{ if(window.Sfx&&Sfx.toggle)Sfx.toggle(); }catch(_){} paintSnd(); };
  setTimeout(paintSnd,400);

  // ── boot ──
  (async function(){
    try{
      if(isDaily){ const s=loadState(); if(s&&s.day===utcDay()&&s.finished){ GRID=s.grid; cells=s.cells; over=true; won=!!s.won; livesLeft=s.lives||0; bestCombo=s.best||0; rowFb=rowFeedback(); await loadPhotos(); render(); return; } }
      // daily reuses the cached generated board (stable across reloads); else generate live.
      if(isDaily){ const cg=loadGrid(); if(cg&&cg.day===utcDay()&&cg.grid){ GRID=cg.grid; } }
      if(!GRID){ GRID=await generateGrid(isDaily?utcDay():Math.floor(Math.random()*1e9)); if(isDaily) saveGrid({day:utcDay(),grid:GRID}); }
      cells=[null,null,null,null,null,null,null,null,null];
      await loadPhotos();
      render();
    }catch(e){ stage.innerHTML='<div class="loading">Error: '+e.message+'</div>'; }
  })();
  async function loadPhotos(){ const ids=[].concat(GRID[0],GRID[1]); await Promise.all(ids.map(function(id){ return api('person/'+id).then(function(d){ photos[id]=d.profile_path; }).catch(function(){}); })); }
})();
</script>
<script defer src="/sfx.js"></script>
<script defer src="/collection.js"></script>
</body>
