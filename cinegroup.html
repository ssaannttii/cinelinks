<style>

*{box-sizing:border-box;margin:0;padding:0}

.tile:hover{border-color:rgba(232,160,0,.4)}

<script>
(function(){
  'use strict';
  const PRACTICE = /[?&]practice=1/.test(location.search);
  const IMG='/api/tmdb?path=';

  // ---------- baked pools (validated against TMDB) ----------
  // saga films: [tmdbId, fullTitle, shortDisplay]
  const SAGAS=[
   {n:"John Wick", f:[[245891,"John Wick","John Wick"],[324552,"John Wick: Chapter 2","John Wick 2"],[458156,"John Wick: Chapter 3 - Parabellum","John Wick 3"],[603692,"John Wick: Chapter 4","John Wick 4"]]},
   {n:"Middle-earth", f:[[120,"The Fellowship of the Ring","The Fellowship of the Ring"],[121,"The Two Towers","The Two Towers"],[122,"The Return of the King","The Return of the King"],[49051,"The Hobbit: An Unexpected Journey","An Unexpected Journey"],[57158,"The Hobbit: The Desolation of Smaug","Desolation of Smaug"]]},
   {n:"Toy Story", f:[[862,"Toy Story","Toy Story"],[863,"Toy Story 2","Toy Story 2"],[10193,"Toy Story 3","Toy Story 3"],[301528,"Toy Story 4","Toy Story 4"]]},
   {n:"The Hunger Games", f:[[70160,"The Hunger Games","The Hunger Games"],[101299,"Catching Fire","Catching Fire"],[131631,"Mockingjay - Part 1","Mockingjay - Part 1"],[131634,"Mockingjay - Part 2","Mockingjay - Part 2"]]},
   {n:"Mission: Impossible", f:[[954,"Mission: Impossible","Mission: Impossible"],[56292,"Ghost Protocol","Ghost Protocol"],[177677,"Rogue Nation","Rogue Nation"],[353081,"Fallout","Fallout"]]},
   {n:"Jurassic Park", f:[[329,"Jurassic Park","Jurassic Park"],[330,"The Lost World","The Lost World"],[135397,"Jurassic World","Jurassic World"],[351286,"Fallen Kingdom","Fallen Kingdom"]]},
   {n:"The Matrix", f:[[603,"The Matrix","The Matrix"],[604,"The Matrix Reloaded","Reloaded"],[605,"The Matrix Revolutions","Revolutions"],[624860,"The Matrix Resurrections","Resurrections"]]},
   {n:"Shrek", f:[[808,"Shrek","Shrek"],[809,"Shrek 2","Shrek 2"],[810,"Shrek the Third","Shrek the Third"],[10192,"Shrek Forever After","Shrek Forever After"]]},
   {n:"Pirates of the Caribbean", f:[[22,"The Curse of the Black Pearl","Curse of the Black Pearl"],[58,"Dead Man's Chest","Dead Man's Chest"],[285,"At World's End","At World's End"],[1865,"On Stranger Tides","On Stranger Tides"]]},
   {n:"Rocky", f:[[1366,"Rocky","Rocky"],[1367,"Rocky II","Rocky II"],[1371,"Rocky III","Rocky III"],[1374,"Rocky IV","Rocky IV"],[1246,"Rocky Balboa","Rocky Balboa"]]},
   {n:"Despicable Me", f:[[20352,"Despicable Me","Despicable Me"],[93456,"Despicable Me 2","Despicable Me 2"],[324852,"Despicable Me 3","Despicable Me 3"],[519182,"Despicable Me 4","Despicable Me 4"]]},
   {n:"Indiana Jones", f:[[85,"Raiders of the Lost Ark","Raiders of the Lost Ark"],[87,"The Temple of Doom","The Temple of Doom"],[89,"The Last Crusade","The Last Crusade"],[217,"The Kingdom of the Crystal Skull","Crystal Skull"]]},
   {n:"Harry Potter", f:[[671,"The Philosopher's Stone","Philosopher's Stone"],[672,"The Chamber of Secrets","Chamber of Secrets"],[673,"The Prisoner of Azkaban","Prisoner of Azkaban"],[674,"The Goblet of Fire","Goblet of Fire"]]},
   {n:"Star Wars", f:[[11,"Star Wars","Star Wars"],[1891,"The Empire Strikes Back","Empire Strikes Back"],[1892,"Return of the Jedi","Return of the Jedi"],[140607,"The Force Awakens","The Force Awakens"]]}
  ];
  const THEMES=[
   {n:"Stranded in space", f:[[157336,"Interstellar"],[49047,"Gravity"],[286217,"The Martian"],[568,"Apollo 13"],[419704,"Ad Astra"]]},
   {n:"Heist crews", f:[[161,"Ocean's Eleven"],[949,"Heat"],[9654,"The Italian Job"],[388,"Inside Man"],[339403,"Baby Driver"]]},
   {n:"Boxing dramas", f:[[1578,"Raging Bull"],[70,"Million Dollar Baby"],[312221,"Creed"],[45317,"The Fighter"],[921,"Cinderella Man"]]},
   {n:"Time travel", f:[[105,"Back to the Future"],[59967,"Looper"],[137113,"Edge of Tomorrow"],[577922,"Tenet"],[141,"Donnie Darko"]]},
   {n:"Shark attacks", f:[[578,"Jaws"],[345940,"The Meg"],[403119,"47 Meters Down"],[332567,"The Shallows"],[8914,"Deep Blue Sea"]]},
   {n:"Zombie outbreaks", f:[[72190,"World War Z"],[19908,"Zombieland"],[170,"28 Days Later"],[396535,"Train to Busan"],[747,"Shaun of the Dead"]]},
   {n:"Natural disasters", f:[[664,"Twister"],[254128,"San Andreas"],[435,"The Day After Tomorrow"],[14161,"2012"],[9619,"Dante's Peak"]]},
   {n:"Music biopics", f:[[424694,"Bohemian Rhapsody"],[504608,"Rocketman"],[69,"Walk the Line"],[1677,"Ray"],[614934,"Elvis"]]},
   {n:"Courtroom dramas", f:[[881,"A Few Good Men"],[389,"12 Angry Men"],[1645,"A Time to Kill"],[24226,"The Verdict"],[9800,"Philadelphia"]]},
   {n:"Spy thrillers", f:[[49517,"Tinker Tailor Soldier Spy"],[296098,"Bridge of Spies"],[341013,"Atomic Blonde"],[27576,"Salt"],[13479,"Spy Game"]]},
   {n:"Pandemic outbreaks", f:[[39538,"Contagion"],[6950,"Outbreak"],[6479,"I Am Legend"],[63,"Twelve Monkeys"]]},
   {n:"Westerns", f:[[429,"The Good, the Bad and the Ugly"],[68718,"Django Unchained"],[44264,"True Grit"],[14168,"3:10 to Yuma"],[11969,"Tombstone"]]}
  ];
  const ACTORS=[[31,"Tom Hanks"],[500,"Tom Cruise"],[6193,"Leonardo DiCaprio"],[287,"Brad Pitt"],[5292,"Denzel Washington"],[1245,"Scarlett Johansson"],[234352,"Margot Robbie"],[1813,"Anne Hathaway"],[1892,"Matt Damon"],[6384,"Keanu Reeves"],[3223,"Robert Downey Jr."],[54693,"Emma Stone"],[30614,"Ryan Gosling"],[2037,"Cillian Murphy"],[6885,"Charlize Theron"],[524,"Natalie Portman"],[2231,"Samuel L. Jackson"],[505710,"Zendaya"],[18897,"Jackie Chan"],[5081,"Emily Blunt"],[1136406,"Tom Holland"],[71580,"Benedict Cumberbatch"],[10882,"Rosamund Pike"],[224513,"Ana de Armas"]];
  const DIRECTORS=[[525,"Christopher Nolan"],[138,"Quentin Tarantino"],[488,"Steven Spielberg"],[1032,"Martin Scorsese"],[5655,"Wes Anderson"],[45400,"Greta Gerwig"],[137427,"Denis Villeneuve"],[2710,"James Cameron"],[510,"Tim Burton"],[240,"Stanley Kubrick"],[578,"Ridley Scott"],[7467,"David Fincher"],[10828,"Guillermo del Toro"],[291263,"Jordan Peele"],[21684,"Bong Joon-ho"],[1769,"Sofia Coppola"],[55934,"Taika Waititi"],[11218,"Alfonso Cuarón"]];

  const TYPE={ saga:{color:'var(--c-saga)',sq:'🟨'}, theme:{color:'var(--c-theme)',sq:'🟦'}, actor:{color:'var(--c-actor)',sq:'🟩'}, director:{color:'var(--c-director)',sq:'🟪'} };
  const ORDER=['saga','theme','actor','director'];

  // ---------- helpers ----------
  function utcDay(){ const n=new Date(); return Math.floor(Date.UTC(n.getUTCFullYear(),n.getUTCMonth(),n.getUTCDate())/864e5); }
  function hash(s){ s=''+s; let h=5381; for(let i=0;i<s.length;i++) h=((h<<5)+h+s.charCodeAt(i))|0; return h>>>0; }
  function rnd(seed,i){ let x=(hash(seed)^Math.imul(i+1,0x9E3779B1))>>>0; x=Math.imul(x^(x>>>15),0x85EBCA6B)>>>0; x=Math.imul(x^(x>>>13),0xC2B2AE35)>>>0; return (x^(x>>>16))>>>0; }
  function orderBy(arr,seed){ return arr.map((x,i)=>[x,rnd(seed,i)]).sort((a,b)=>a[1]-b[1]).map(p=>p[0]); }
  function shuffle(arr,seed){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=rnd(seed,i)%(i+1); const t=a[i];a[i]=a[j];a[j]=t; } return a; }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function shorten(t){ if(t.length<=26) return t; for(const sep of [' - ',' – ']){ const i=t.indexOf(sep); if(i>6&&i<26) return t.slice(0,i); } return t.slice(0,24).trim()+'…'; }
  function getLS(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch(_){ return null; } }
  function setLS(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(_){} }

  const credCache={};
  async function credits(id){ if(credCache[id]) return credCache[id]; const d=await fetch(IMG+'person/'+id+'/combined_credits&language=en-US').then(r=>r.json()).catch(()=>({})); credCache[id]=d; return d; }
  const mcCache={};
  async function movieCredits(id){ if(mcCache[id]) return mcCache[id]; const d=await fetch(IMG+'movie/'+id+'/credits&language=en-US').then(r=>r.json()).catch(()=>({})); mcCache[id]=d; return d; }

  const YEAR=new Date().getUTCFullYear()+1;

  // Curated actor–director collaborations: their filmographies OVERLAP, which is the
  // raw material for fair "traps". [actorId, directorId, actorName, directorName].
  const COLLABS=[
   [3894,525,"Christian Bale","Christopher Nolan"],
   [2037,525,"Cillian Murphy","Christopher Nolan"],
   [6193,1032,"Leonardo DiCaprio","Martin Scorsese"],
   [380,1032,"Robert De Niro","Martin Scorsese"],
   [85,510,"Johnny Depp","Tim Burton"],
   [31,488,"Tom Hanks","Steven Spielberg"],
   [287,7467,"Brad Pitt","David Fincher"],
   [2231,138,"Samuel L. Jackson","Quentin Tarantino"],
   [131,137427,"Jake Gyllenhaal","Denis Villeneuve"],
   [1532,5655,"Bill Murray","Wes Anderson"],
   [1892,578,"Matt Damon","Ridley Scott"]
  ];
  // Famous actors the solver is allowed to treat as a nameable category (avoids
  // flagging character actors who happen to appear in 4 tiles).
  const FAMOUS_ACTORS=new Set([...ACTORS.map(a=>a[0]), ...COLLABS.map(c=>c[0])]);

  // ---- title-feature predicates (free wordplay categories, for the solver) ----
  const COLOR_RE=/\b(red|blue|green|black|white|yellow|purple|pink|orange|gold|golden|silver|scarlet|crimson|grey|gray)\b/i;
  function featNumber(t){ return /\d/.test(t); }
  function featColor(t){ return COLOR_RE.test(t); }
  function featOneWord(t){ return t.trim().split(/\s+/).length===1; }
  const TITLE_FEATS=[['number',featNumber],['color',featColor],['oneword',featOneWord]];

  const movieFilter=x=>x.media_type==='movie'&&x.poster_path&&x.release_date&&parseInt(x.release_date.slice(0,4))<=YEAR&&(x.vote_count||0)>=800;
  const stableSort=(a,b)=>(b.vote_count||0)-(a.vote_count||0) || a.id-b.id;

  // facts per tile from movie/{id}/credits — for the uniqueness solver
  async function buildFacts(tiles){
    const facts={};
    await Promise.all(tiles.map(async t=>{
      const c=await movieCredits(t.id);
      const directorIds=new Set((c.crew||[]).filter(x=>x.job==='Director').map(x=>x.id));
      const leadIds=new Set((c.cast||[]).filter(x=>x.order!=null&&x.order<=4).map(x=>x.id));
      facts[t.id]={id:t.id,title:t.title,directorIds,leadIds};
    }));
    return facts;
  }

  // all nameable categories present among the 16 tiles (>=4 members)
  function buildCats(tiles,facts){
    const ids=tiles.map(t=>t.id);
    const cats=[];
    const add=(set)=>{ if(set.size>=4) cats.push({set}); };
    // sagas / themes
    for(const s of SAGAS){ const sids=new Set(s.f.map(f=>f[0])); add(new Set(ids.filter(id=>sids.has(id)))); }
    for(const th of THEMES){ const tids=new Set(th.f.map(f=>f[0])); add(new Set(ids.filter(id=>tids.has(id)))); }
    // directors (any person directing >=4 tiles)
    const dirCount={};
    for(const id of ids) for(const p of facts[id].directorIds) (dirCount[p]=dirCount[p]||new Set()).add(id);
    for(const p in dirCount) add(dirCount[p]);
    // famous actors leading >=4 tiles
    const actCount={};
    for(const id of ids) for(const p of facts[id].leadIds) if(FAMOUS_ACTORS.has(p)) (actCount[p]=actCount[p]||new Set()).add(id);
    for(const p in actCount) add(actCount[p]);
    // title-feature categories
    for(const [,test] of TITLE_FEATS) add(new Set(ids.filter(id=>test(facts[id].title))));
    return cats;
  }

  // count full 4×4 partitions where every group is a single nameable category.
  // Early-exits at 2 (we only need "exactly one"); a node cap rejects over-ambiguous boards.
  function countPartitions(ids,cats){
    let count=0, nodes=0, capped=false;
    function rec(remaining){
      if(count>1||capped) return;
      if(!remaining.length){ count++; return; }
      if(++nodes>120000){ capped=true; return; }
      const t=remaining[0], rest=remaining.slice(1);
      for(const cat of cats){
        if(!cat.set.has(t)) continue;
        const others=rest.filter(x=>cat.set.has(x));
        if(others.length<3) continue;
        for(let i=0;i<others.length&&count<=1;i++)
          for(let j=i+1;j<others.length&&count<=1;j++)
            for(let k=j+1;k<others.length&&count<=1;k++){
              const grp=new Set([t,others[i],others[j],others[k]]);
              rec(remaining.filter(x=>!grp.has(x)));
            }
        if(count>1) return;
      }
    }
    rec(ids);
    return capped?99:count;
  }

  // ---------- v2 generator: deliberate trap, provably unique ----------
  async function genTrap(seed){
    for(const [aid,did,aname,dname] of orderBy(COLLABS,'c'+seed).slice(0,3)){
      const ac=await credits(aid), dc=await credits(did);
      const aIds=new Set((ac.cast||[]).map(x=>x.id));
      const aLeads=(ac.cast||[]).filter(x=>movieFilter(x)&&x.order!=null&&x.order<=4).sort(stableSort);
      const directed=(dc.crew||[]).filter(x=>x.job==='Director'&&movieFilter(x)).sort(stableSort);
      if(directed.length<4) continue;
      const overlap=directed.filter(f=>aIds.has(f.id));        // D films starring A → traps
      const nonOverlapDir=directed.filter(f=>!aIds.has(f.id));
      if(!overlap.length || nonOverlapDir.length<2) continue;
      const trapN=1+(hash('tn'+seed)%2);                       // 1 or 2 trap tiles
      const dirPick=[...overlap.slice(0,trapN), ...nonOverlapDir].slice(0,4);
      if(dirPick.length<4) continue;
      const dirSet=new Set(dirPick.map(f=>f.id));
      // actor group: A's lead films NOT directed by D
      const aSeen=new Set(), aGroup=[];
      for(const f of aLeads){ const t=f.title; if(dirSet.has(f.id)||aSeen.has(t)) continue; const dd=directed.find(x=>x.id===f.id); if(dd) continue; aSeen.add(t); aGroup.push({id:f.id,title:shorten(t)}); if(aGroup.length>=4) break; }
      if(aGroup.length<4) continue;
      const used=new Set([...dirSet, ...aGroup.map(f=>f.id)]);
      const dDir=new Set(directed.map(f=>f.id));
      // fill the other 8 with the first clean saga + theme (none starring A or directed by D)
      const cleanGroup=(pool,seedKey,titleFn)=>{
        for(const p of orderBy(pool,seedKey+seed)){
          const tiles=[];
          for(const f of p.f){ if(tiles.length>=4)break; if(!used.has(f[0])&&!aIds.has(f[0])&&!dDir.has(f[0])) tiles.push({id:f[0],title:titleFn(f)}); }
          if(tiles.length>=4){ tiles.forEach(t=>used.add(t.id)); return {pool:p, tiles}; }
        }
        return null;
      };
      const sg=cleanGroup(SAGAS,'s',f=>f[2]||f[1]); if(!sg) continue;
      const tg=cleanGroup(THEMES,'t',f=>f[1]); if(!tg) continue;
      const raw=[
        {type:'saga', label:'Same franchise: '+sg.pool.n, tiles:sg.tiles},
        {type:'theme', label:tg.pool.n, tiles:tg.tiles},
        {type:'actor', label:'Starring '+aname, tiles:aGroup},
        {type:'director', label:'Directed by '+dname, tiles:dirPick.map(f=>({id:f.id,title:shorten(f.title)}))}
      ];
      const all=raw.flatMap(g=>g.tiles);
      if(new Set(all.map(t=>t.id)).size<16) continue;            // defensive: 16 distinct tiles
      const facts=await buildFacts(all);
      if(countPartitions(all.map(t=>t.id), buildCats(all,facts))!==1) continue;  // must be the only solution
      const trapTitles=dirPick.filter(f=>aIds.has(f.id)).map(f=>shorten(f.title));
      return {raw, trap:{actor:aname, director:dname, films:trapTitles}};
    }
    return null;
  }

  // ---------- v1 fallback: fully disjoint (no traps), always solvable ----------
  async function genSimple(seed){
    const saga=SAGAS[hash('s'+seed)%SAGAS.length], theme=THEMES[hash('t'+seed)%THEMES.length];
    const usedIds=new Set(); const sagaTiles=[], themeTiles=[];
    for(const f of saga.f){ if(sagaTiles.length>=4)break; if(!usedIds.has(f[0])){ usedIds.add(f[0]); sagaTiles.push({id:f[0],title:f[2]||f[1]}); } }
    for(const f of theme.f){ if(themeTiles.length>=4)break; if(!usedIds.has(f[0])){ usedIds.add(f[0]); themeTiles.push({id:f[0],title:f[1]}); } }
    if(sagaTiles.length<4||themeTiles.length<4) return null;
    const reserved=new Set([...usedIds]);
    let aTiles=null,aName=null,aIds=null;
    for(const [aid,aname] of orderBy(ACTORS,'a'+seed)){
      const c=await credits(aid); const cast=c.cast||[]; const ids=new Set(cast.map(x=>x.id));
      if([...reserved].some(id=>ids.has(id))) continue;
      const leads=cast.filter(x=>(x.media_type==='movie'||x.media_type==='tv')&&(x.vote_count||0)>=800&&x.order!=null&&x.order<=4&&x.poster_path&&(x.release_date||x.first_air_date)).sort(stableSort);
      const seen=new Set(),fr=[];
      for(const f of leads){ const t=f.title||f.name; if(usedIds.has(f.id)||seen.has(t))continue; seen.add(t); fr.push({id:f.id,title:shorten(t)}); if(fr.length>=4)break; }
      if(fr.length>=4){ aTiles=fr;aName=aname;aIds=ids;fr.forEach(f=>usedIds.add(f.id)); break; }
    }
    if(!aTiles) return null;
    let dTiles=null,dName=null;
    for(const [did,dname] of orderBy(DIRECTORS,'d'+seed)){
      const c=await credits(did); const directed=(c.crew||[]).filter(x=>x.job==='Director'&&movieFilter(x));
      const dIds=new Set(directed.map(x=>x.id));
      if([...usedIds].some(id=>dIds.has(id))) continue;
      if(aIds&&[...dIds].some(id=>aIds.has(id))) continue;
      const ranked=directed.sort(stableSort); const seen=new Set(),fr=[];
      for(const f of ranked){ const t=f.title; if(usedIds.has(f.id)||seen.has(t))continue; seen.add(t); fr.push({id:f.id,title:shorten(t)}); if(fr.length>=4)break; }
      if(fr.length>=4){ dTiles=fr;dName=dname;fr.forEach(f=>usedIds.add(f.id)); break; }
    }
    if(!dTiles) return null;
    return {raw:[
      {type:'saga', label:'Same franchise: '+saga.n, tiles:sagaTiles},
      {type:'theme', label:theme.n, tiles:themeTiles},
      {type:'actor', label:'Starring '+aName, tiles:aTiles},
      {type:'director', label:'Directed by '+dName, tiles:dTiles}
    ], trap:null};
  }

  // difficulty → colour/square (yellow easiest … purple hardest, where the trap lives)
  const DIFF={saga:1, actor:2, theme:3, director:4};
  const COLORS=['#e8c24a','#86c98a','#7aa6e8','#b58ad6'];
  const SQ=['🟨','🟩','🟦','🟪'];
  function finalize(out){
    const groups=out.raw.slice().sort((a,b)=>(DIFF[a.type]||3)-(DIFF[b.type]||3));
    groups.forEach((g,i)=>{ g.key='g'+i; g.color=COLORS[i]; g.sq=SQ[i]; });
    return {groups, trap:out.trap};
  }

  async function generateWithRetry(seed){
    for(let k=0;k<3;k++){ const t=await genTrap(seed+k*7919); if(t) return finalize(t); }   // prefer trap puzzles
    for(let k=0;k<6;k++){ const s=await genSimple(seed+k*7919); if(s) return finalize(s); }   // fallback
    return null;
  }

  // ---------- state ----------
  const SKEY='cinegroupState', STKEY='cinegroupStats', PKEY='cinegroupPuzzle';
  const day=utcDay();
  let puzzle=null;          // {groups:[...]}
  let tileMap={};           // tileId -> {id,title,type}
  let board=[];             // ordered tile ids on the grid
  let selected=[];          // selected tile ids
  let solved=[];            // [{type,label,tiles}]
  let mistakes=0;
  const MAX_MIST=4;
  let guesses=[];           // [[type,type,type,type], ...] for share
  let finished=false, won=false;
  let locked=false;
  let lastSolvedKey=null;   // for the "new banner" reveal animation

  const stage=document.getElementById('stage');
  const toastEl=document.getElementById('toast');
  let toastT=null;
  function toast(msg){ toastEl.textContent=msg; toastEl.classList.add('on'); clearTimeout(toastT); toastT=setTimeout(()=>toastEl.classList.remove('on'),1500); }

  function buildTileMap(){
    tileMap={};
    for(const g of puzzle.groups) for(const t of g.tiles) tileMap[t.id]={id:t.id,title:t.title,key:g.key,sq:g.sq};
  }
  function groupByKey(k){ return puzzle.groups.find(g=>g.key===k); }

  function loadDaily(){
    const st=getLS(SKEY);
    if(st && st.day===day){
      solved=st.solved||[]; mistakes=st.mistakes||0; guesses=st.guesses||[]; finished=!!st.finished; won=!!st.won;
      board=st.board||board;
    }
  }
  function saveDaily(){
    if(PRACTICE) return;
    setLS(SKEY,{day,solved,mistakes,guesses,finished,won,board});
  }

  function statsBump(didWin){
    if(PRACTICE) return;
    const s=getLS(STKEY)||{played:0,won:0,streak:0,best:0,lastDay:null};
    if(s.lastDay===day) return;
    s.played++; if(didWin){ s.won++; s.streak=(s.lastDay===day-1?s.streak:0)+1; if(s.streak>s.best)s.best=s.streak; } else { s.streak=0; }
    s.lastDay=day; setLS(STKEY,s);
  }

  // ---------- rendering ----------
  function render(){
    if(finished){ renderResult(); return; }
    let h='<div class="solved-area" id="solvedArea">'+solved.map(s=>solvedRow(s, s.key===lastSolvedKey?'new':'')).join('')+'</div>';
    h+='<div class="grid'+(selected.length?' focus':'')+'" id="grid">';
    board.forEach((id,i)=>{ const t=tileMap[id]; if(t) h+='<div class="tile" data-id="'+id+'" style="animation-delay:'+(i*0.022).toFixed(3)+'s">'+esc(t.title)+'</div>'; });
    h+='</div>';
    h+='<div class="mistakes">Mistakes remaining <span class="dots" id="dots">'+dotsHtml()+'</span></div>';
    h+='<div class="controls">'+
       '<button class="btn" id="shuffleBtn">Shuffle</button>'+
       '<button class="btn" id="deselBtn" disabled>Deselect</button>'+
       '<button class="btn btn-go" id="goBtn" disabled>Submit</button>'+
       '</div>';
    stage.innerHTML=h;
    document.querySelectorAll('.tile').forEach(el=>el.addEventListener('click',()=>onTile(el.dataset.id)));
    document.getElementById('shuffleBtn').onclick=onShuffle;
    document.getElementById('deselBtn').onclick=()=>{ selected=[]; syncSel(); };
    document.getElementById('goBtn').onclick=onSubmit;
    syncSel();
  }
  function dotsHtml(){ let h=''; for(let i=0;i<MAX_MIST;i++) h+='<span class="dot'+(i<mistakes?' gone':'')+'"></span>'; return h; }
  function solvedRow(g,cls){ return '<div class="solved'+(cls?' '+cls:'')+'" style="background:'+g.color+'"><div class="s-label">'+esc(g.label)+'</div><div class="s-titles">'+g.tiles.map(t=>esc(t.title)).join(' · ')+'</div></div>'; }
  function syncSel(){
    document.querySelectorAll('.tile').forEach(el=>el.classList.toggle('sel',selected.includes(el.dataset.id)));
    const grid=document.getElementById('grid'); if(grid) grid.classList.toggle('focus', selected.length>0);
    const go=document.getElementById('goBtn'), des=document.getElementById('deselBtn');
    if(go) go.disabled=selected.length!==4;
    if(des) des.disabled=selected.length===0;
  }
  function onTile(id){ if(locked) return; const i=selected.indexOf(id); if(i>=0) selected.splice(i,1); else { if(selected.length>=4) return; selected.push(id); } syncSel(); }
  function onShuffle(){ board=shuffle(board, Date.now()); const g=document.getElementById('grid'); if(g){ g.innerHTML=board.map((id,i)=>{const t=tileMap[id];return '<div class="tile" data-id="'+id+'" style="animation-delay:'+(i*0.022).toFixed(3)+'s">'+esc(t.title)+'</div>';}).join(''); document.querySelectorAll('.tile').forEach(el=>el.addEventListener('click',()=>onTile(el.dataset.id))); syncSel(); } }

  function pushSolved(g){ solved.push({key:g.key,label:g.label,color:g.color,tiles:g.tiles}); }
  function onSubmit(){
    if(locked||selected.length!==4) return;
    const keys=selected.map(id=>tileMap[id].key);
    guesses.push(keys.slice());
    const allSame=keys.every(k=>k===keys[0]);
    if(allSame){
      locked=true;
      const g=groupByKey(keys[0]);
      // bounce the four correct tiles in a quick ripple, then collapse into the banner
      selected.forEach((id,i)=>{ const el=document.querySelector('.tile[data-id="'+id+'"]'); if(el){ el.style.animationDelay=(i*0.08)+'s'; el.classList.remove('sel'); el.classList.add('solving'); } });
      lastSolvedKey=g.key;
      setTimeout(()=>{
        pushSolved(g);
        board=board.filter(id=>!selected.includes(id));
        selected=[]; locked=false;
        saveDaily();
        if(solved.length===4){ finished=true; won=true; statsBump(true); render(); }
        else render();
      },640);
    } else {
      const counts={}; keys.forEach(k=>counts[k]=(counts[k]||0)+1);
      const max=Math.max(...Object.values(counts));
      selected.forEach(id=>{ const el=document.querySelector('.tile[data-id="'+id+'"]'); if(el){ el.classList.add('wrong'); setTimeout(()=>el.classList.remove('wrong'),400);} });
      mistakes++;
      const dots=document.getElementById('dots'); if(dots) dots.innerHTML=dotsHtml();
      if(max===3) toast('One away…');
      saveDaily();
      if(mistakes>=MAX_MIST){
        const have=new Set(solved.map(s=>s.key));
        for(const g of puzzle.groups){ if(!have.has(g.key)) pushSolved(g); }
        finished=true; won=false; statsBump(false); saveDaily(); render();
      }
    }
  }

  // ---------- result ----------
  function keySq(k){ const g=groupByKey(k); return g?g.sq:'⬛'; }
  function shareGrid(){
    return guesses.map(row=>row.map(keySq).join('')).join('\n');
  }
  function renderResult(){
    const order=puzzle.groups.map(g=>g.key);
    const sa='<div class="solved-area">'+order.map(k=>solved.find(s=>s.key===k)).filter(Boolean).map((s,i)=>solvedRow(s, won?'win':'')).join('')+'</div>';
    const st=getLS(STKEY)||{streak:0,best:0,won:0,played:0};
    let h=sa+'<div class="result">';
    h+='<h2>'+(won?'Solved it! 🎬':'Out of guesses')+'</h2>';
    h+='<p>'+(won?('Found all four with '+mistakes+' mistake'+(mistakes===1?'':'s')+'.'):'Here were the four connections.')+'</p>';
    if(puzzle.trap&&puzzle.trap.films&&puzzle.trap.films.length){ h+='<p class="trapline">🎬 Trap of the day: <b>'+esc(puzzle.trap.films[0])+'</b> looked like a '+esc(puzzle.trap.actor)+' film — but it belonged with '+esc(puzzle.trap.director)+'.</p>'; }
    if(!PRACTICE) h+='<div class="statline"><div class="stat"><b>'+st.streak+'</b>streak</div><div class="stat"><b>'+st.best+'</b>best</div><div class="stat"><b>'+st.won+'</b>solved</div></div>';
    h+='<div class="controls"><button class="btn btn-go" id="shareBtn">Share</button>';
    h+=PRACTICE?'<button class="btn" id="againBtn">New puzzle</button>':'<a class="btn" href="?practice=1" style="display:flex;align-items:center;justify-content:center;text-decoration:none">Practice</a>';
    h+='</div></div>';
    stage.innerHTML=h;
    document.getElementById('shareBtn').onclick=doShare;
    if(PRACTICE){ const a=document.getElementById('againBtn'); if(a) a.onclick=()=>location.reload(); }
  }
  function doShare(){
    const head='CineGroup'+(PRACTICE?'':' #'+(day-20000))+(won?' '+(mistakes)+'/'+MAX_MIST:' ✗');
    const txt=head+'\n'+shareGrid()+'\ncinelinks.vercel.app';
    if(navigator.share){ navigator.share({text:txt}).catch(()=>{}); }
    else { navigator.clipboard.writeText(txt).then(()=>toast('Copied!')).catch(()=>toast('Copy failed')); }
  }

  // ---------- mode switch link ----------
  const ms=document.getElementById('modeSwitch');
  document.getElementById('modeLbl').textContent=PRACTICE?'Practice':'Daily';
  ms.textContent=PRACTICE?'Daily →':'Practice →';
  ms.href=PRACTICE?'/cinegroup.html':'?practice=1';

  // ---------- boot ----------
  async function boot(){
    const seed = PRACTICE ? (Date.now()%1e9) : day;
    // cached daily puzzle (avoid refetch + keep determinism even if pools shift).
    // Ignore caches from before v2 (groups now carry a per-group `key`/`color`).
    if(!PRACTICE){ const cp=getLS(PKEY); if(cp && cp.day===day && cp.puzzle && cp.puzzle.groups && cp.puzzle.groups[0] && cp.puzzle.groups[0].key){ puzzle=cp.puzzle; } }
    if(!puzzle){
      puzzle=await generateWithRetry(seed);
      if(!puzzle){ stage.innerHTML='<div class="loading">Could not build a puzzle. Please try again later.</div>'; return; }
      if(!PRACTICE) setLS(PKEY,{day,puzzle});
    }
    buildTileMap();
    // build board order
    if(!board.length){
      const allIds=puzzle.groups.flatMap(g=>g.tiles.map(t=>t.id));
      board=shuffle(allIds, PRACTICE?seed:('b'+day));
    }
    // Only restore saved progress in daily mode — practice is always a fresh game.
    if(!PRACTICE){
      loadDaily();
      // Migration guard: discard pre-v2 saved state (no per-group keys) that won't match the new board.
      const validKeys=new Set(puzzle.groups.map(g=>g.key));
      const staleSolved=solved.some(s=>!s.key||!validKeys.has(s.key));
      const staleBoard=(st=>st&&st.day===day&&st.board&&st.board.some(id=>!tileMap[id]))(getLS(SKEY));
      if(staleSolved||staleBoard){ solved=[]; mistakes=0; guesses=[]; finished=false; won=false; board=shuffle(puzzle.groups.flatMap(g=>g.tiles.map(t=>t.id)),'b'+day); }
      else if(solved.length){ const solvedIds=new Set(solved.flatMap(s=>s.tiles.map(t=>t.id))); board=board.filter(id=>!solvedIds.has(id)); }
    }
    render();
  }
  boot();
})();
</script>
</body>
