<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineReel — Whose filmography is this?</title>
<meta name="description" content="Guess the actor from their films, revealed one poster at a time — from deep cut to blockbuster.">
<meta name="theme-color" content="#0d0d0d">
<link rel="icon" type="image/png" href="/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--s1:#181818;--bdr:rgba(255,255,255,.1);--txt:#f0f0f0;--mut:#8d8d8d;--gold:#e8a000;--good:#5bbd7a}
body{font-family:'Inter',-apple-system,sans-serif;background:radial-gradient(circle at 50% -10%,rgba(232,160,0,.10),transparent 36%),linear-gradient(180deg,#101010,var(--bg) 340px);color:var(--txt);min-height:100vh;display:flex}
.wrap{max-width:560px;margin:auto;padding:26px 18px 70px;width:100%;text-align:center}
.logo{font-size:2rem;font-weight:800;letter-spacing:-.02em}
.logo b{color:var(--gold)}
.tag{color:var(--mut);font-size:.9rem;margin:6px 0 4px}
.kicker{color:var(--gold);font-weight:700;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:20px}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:0 auto 18px;max-width:430px}
.cell{aspect-ratio:2/3;border-radius:10px;border:1px solid var(--bdr);background:var(--s1);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
.cell img{width:100%;height:100%;object-fit:cover;animation:pop .35s cubic-bezier(.22,1,.36,1)}
.cell .lock{color:#3a3a3a;font-size:1.6rem;font-weight:800}
.cell .yr{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(0,0,0,.82));color:#fff;font-size:.62rem;font-weight:600;padding:14px 4px 4px;letter-spacing:.03em}
.cell.next{border-color:rgba(232,160,0,.45);box-shadow:0 0 0 2px rgba(232,160,0,.18)}
@keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.dots{display:flex;gap:6px;justify-content:center;margin:0 0 16px}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.16)}
.dot.used{background:#c0494a}
.dot.win{background:var(--good)}
.hint{color:var(--mut);font-size:.82rem;margin:0 0 12px}
.guess{position:relative;max-width:420px;margin:0 auto}
.guess input{width:100%;padding:13px 15px;border-radius:11px;border:1px solid var(--bdr);background:rgba(255,255,255,.05);color:var(--txt);font-family:inherit;font-size:.95rem;outline:none}
.guess input:focus{border-color:rgba(232,160,0,.55)}
.ac{position:absolute;left:0;right:0;top:54px;background:#1c1c1c;border:1px solid var(--bdr);border-radius:11px;overflow:hidden;z-index:5;text-align:left;box-shadow:0 18px 50px rgba(0,0,0,.5)}
.ac-item{display:flex;align-items:center;gap:10px;padding:8px 11px;cursor:pointer}
.ac-item:hover,.ac-item.sel{background:rgba(232,160,0,.12)}
.ac-item img{width:30px;height:42px;object-fit:cover;border-radius:5px;background:#333;flex-shrink:0}
.ac-item .nm{font-weight:600;font-size:.88rem}
.ac-item .kf{color:var(--mut);font-size:.72rem}
.row{display:flex;gap:8px;max-width:420px;margin:10px auto 0}
.btn{flex:1;padding:11px;border-radius:11px;border:1px solid var(--bdr);background:transparent;color:var(--txt);font-family:inherit;font-weight:700;font-size:.85rem;cursor:pointer}
.btn.gold{background:var(--gold);color:#111;border-color:var(--gold)}
.btn:hover{opacity:.92}
.miss{min-height:20px;color:#d98b8b;font-size:.8rem;margin-top:10px}
.result{margin-top:18px;padding:18px;border-radius:14px;border:1px solid var(--bdr);background:rgba(255,255,255,.04);display:none}
.result.show{display:block;animation:pop .4s both}
.result h2{font-size:1.3rem;margin-bottom:4px}
.result h2.win{color:var(--good)}
.result .who{display:flex;align-items:center;gap:12px;justify-content:center;margin:12px 0}
.result .who img{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
.result .who .nm{font-weight:800;font-size:1.05rem;text-align:left}
.result .who .sub{color:var(--mut);font-size:.8rem}
.loading{color:var(--mut);font-size:.9rem;padding:40px 0}
.foot{margin-top:26px;color:var(--mut);font-size:.74rem}
.foot a{color:var(--gold);text-decoration:none}
</style>
</head>
<body>
<div class="wrap" id="cinereel-app">
  <div class="logo">Cine<b>Reel</b></div>
  <div class="tag">Whose filmography is this?</div>
  <div class="kicker" id="modeLbl">Daily</div>
  <div id="stage"><div class="loading">Loading a career…</div></div>
  <div class="foot">Posters &amp; data from TMDB · part of <a href="/">CineLinks</a></div>
</div>

<script>
(function(){
  const IMG='https://image.tmdb.org/t/p/';
  const REVEALS=6;            // total posters available
  const START=1;              // posters shown at the first guess (then one more per miss)
  const VOTE_FLOOR=250;       // recognisability gate
  const ACTOR_POOL=[{id:2387,name:"Patrick Stewart"},{id:109513,name:"Alexandra Daddario"},{id:976,name:"Jason Statham"},{id:9278,name:"Jennifer Garner"},{id:31,name:"Tom Hanks"},{id:1059597,name:"Zoey Deutch"},{id:1173984,name:"Olivia Cooke"},{id:115440,name:"Sydney Sweeney"},{id:73968,name:"Henry Cavill"},{id:1245,name:"Scarlett Johansson"},{id:550843,name:"Elizabeth Olsen"},{id:18897,name:"Jackie Chan"},{id:1108907,name:"Nick Robinson"},{id:65731,name:"Sam Worthington"},{id:287,name:"Brad Pitt"},{id:1813,name:"Anne Hathaway"},{id:64439,name:"Fan Bingbing"},{id:289,name:"Madeleine Stowe"},{id:505710,name:"Zendaya"},{id:500,name:"Tom Cruise"},{id:64,name:"Gary Oldman"},{id:974169,name:"Jenna Ortega"},{id:2963,name:"Nicolas Cage"},{id:5081,name:"Emily Blunt"},{id:117642,name:"Jason Momoa"},{id:1892,name:"Matt Damon"},{id:17521,name:"Kelly Reilly"},{id:1253360,name:"Pedro Pascal"},{id:12835,name:"Vin Diesel"},{id:6161,name:"Jennifer Connelly"},{id:54882,name:"Morena Baccarin"},{id:6384,name:"Keanu Reeves"},{id:8767,name:"Jim Caviezel"},{id:1372369,name:"Samara Weaving"},{id:18918,name:"Dwayne Johnson"},{id:1356210,name:"Millie Bobby Brown"},{id:76070,name:"Mia Wasikowska"},{id:1172108,name:"Mckenna Grace"},{id:30614,name:"Ryan Gosling"},{id:14061,name:"Jacqueline Bisset"},{id:6856,name:"Kurt Russell"},{id:2604515,name:"Emma Myers"},{id:234352,name:"Margot Robbie"},{id:4808,name:"Giancarlo Esposito"},{id:49624,name:"Jensen Ackles"},{id:192,name:"Morgan Freeman"},{id:205,name:"Kirsten Dunst"},{id:18999,name:"J.K. Simmons"},{id:1190668,name:"Timothée Chalamet"},{id:224513,name:"Ana de Armas"},{id:16501,name:"Milo Ventimiglia"},{id:1136406,name:"Tom Holland"},{id:1397778,name:"Anya Taylor-Joy"},{id:7056,name:"Emma Thompson"},{id:5292,name:"Denzel Washington"},{id:11023,name:"Shawn Ashmore"},{id:16483,name:"Sylvester Stallone"},{id:2034418,name:"Jacob Elordi"},{id:54693,name:"Emma Stone"},{id:9273,name:"Amy Adams"},{id:90130,name:"Aaron Ashmore"},{id:19498,name:"Jon Bernthal"},{id:47296,name:"Jeffrey Dean Morgan"},{id:27972,name:"Josh Hutcherson"},{id:17276,name:"Gerard Butler"},{id:70851,name:"Jack Black"},{id:1425934,name:"Nicholas Galitzine"},{id:164945,name:"Sarah Shahi"},{id:10882,name:"Rosamund Pike"},{id:3223,name:"Robert Downey Jr."},{id:2227,name:"Nicole Kidman"},{id:2037,name:"Cillian Murphy"},{id:587020,name:"Theo James"},{id:131,name:"Jake Gyllenhaal"},{id:11701,name:"Angelina Jolie"},{id:18277,name:"Sandra Bullock"},{id:1372,name:"Karl Urban"},{id:73457,name:"Chris Pratt"},{id:91671,name:"Colman Domingo"},{id:3896,name:"Liam Neeson"},{id:1231,name:"Julianne Moore"},{id:524,name:"Natalie Portman"},{id:1222992,name:"Eiza González"},{id:17303,name:"Ali Larter"},{id:56734,name:"Chloë Grace Moretz"},{id:380,name:"Robert De Niro"},{id:64295,name:"Alan Ritchson"},{id:85,name:"Johnny Depp"}];
  const stage=document.getElementById('stage');
  const isDaily=!/[?&]practice=1/.test(location.search);
  document.getElementById('modeLbl').textContent=isDaily?'Daily':'Practice';

  // ── helpers ───────────────────────────────────────────────
  const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();
  function hash(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
  function rng(seed){let s=seed>>>0;return()=>{s=(Math.imul(1664525,s)+1013904223)&0xffffffff;return (s>>>0)/4294967296;};}
  function api(path){return fetch('/api/tmdb?path='+path+'&language=en-US').then(r=>r.json());}
  function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}
  // Daily completion is stored the same way the other games store theirs, so the
  // home hub can light up the CineReel "✓ Done" badge (markDoneBadges → clueDone).
  function utcDay(){const n=new Date();return Math.floor(Date.UTC(n.getUTCFullYear(),n.getUTCMonth(),n.getUTCDate())/864e5);}
  function loadDone(){try{return JSON.parse(localStorage.getItem('cinereelState')||'null');}catch(_){return null;}}
  function saveDone(o){try{localStorage.setItem('cinereelState',JSON.stringify(o));}catch(_){}}
  function face(pp){return pp?IMG+'w185'+pp:'/logo.png';} // headshot with a safe fallback

  // ── pick a target actor + build the reveal set ────────────
  // How strongly a credit identifies the actor: title fame × how central they are
  // (billing order). A lead in a known film scores high; a buried ensemble role low.
  function billing(order){
    if(order==null) return 0.45;
    if(order<=0) return 1; if(order<=1) return .9; if(order<=2) return .8;
    if(order<=3) return .66; if(order<=5) return .5; if(order<=9) return .34; return .22;
  }
  function ident(votes,order){
    const fame=Math.min(1, Math.log10((votes||0)+10)/Math.log10(60000));
    return fame*(0.35+0.65*billing(order));
  }
  async function buildCredits(personId){
    const cc=await api('person/'+personId+'/combined_credits');
    const seen=new Set();
    return (cc.cast||[])
      .filter(c=>c.poster_path && (c.vote_count||0)>=VOTE_FLOOR && (c.media_type==='movie'||c.media_type==='tv') && c.character && !/\b(self|himself|herself|host|presenter|narrator|guest|themselves)\b/i.test(c.character))
      .filter(c=>{const k=c.media_type+c.id;if(seen.has(k))return false;seen.add(k);return true;})
      .map(c=>({title:c.title||c.name,year:(c.release_date||c.first_air_date||'').slice(0,4),votes:c.vote_count,order:c.order,score:ident(c.vote_count,c.order),poster:c.poster_path}))
      .sort((a,b)=>b.score-a.score); // most identifying first
  }
  // Their SIX most identifying films (fame × how central they are), revealed one at
  // a time from the least-known of those six up to their signature lead. Every poster
  // is a real, known role of theirs — the ramp just goes deep-ish hit → iconic.
  function revealSet(films){
    return films.slice(0,REVEALS).reverse();
  }
  // recent actors seen in Practice — skipped next time so it doesn't repeat
  function seenIds(){try{return JSON.parse(localStorage.getItem('cinereelSeen')||'[]');}catch(_){return[];}}
  function rememberId(id){try{const a=[id,...seenIds().filter(x=>x!==id)].slice(0,40);localStorage.setItem('cinereelSeen',JSON.stringify(a));}catch(_){}}
  async function fromPerson(a){
    const [films,det]=await Promise.all([buildCredits(a.id), api('person/'+a.id).catch(()=>({}))]);
    if(films.length>=4) return {person:{id:a.id,name:a.name,profile_path:det.profile_path},reveal:revealSet(films)};
    return null;
  }
  async function pickTarget(){
    // Daily: deterministic pick from the curated pool (same actor for everyone, all day).
    if(isDaily){
      const order=shuffleSeeded(ACTOR_POOL, hash('cinereel-'+utcDay()));
      for(const a of order){ const t=await fromPerson(a); if(t) return t; }
    } else {
      // Practice: random from the pool, skipping recently-seen actors.
      const skip=new Set(seenIds());
      const order=shuffleSeeded(ACTOR_POOL, (Math.random()*1e9)|0);
      const queue=[...order.filter(a=>!skip.has(a.id)),...order.filter(a=>skip.has(a.id))];
      for(const a of queue){ const t=await fromPerson(a); if(t){ rememberId(a.id); return t; } }
    }
    return null;
  }
  function shuffleSeeded(arr,seed){const a=[...arr],r=rng(seed);for(let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

  // ── game state ────────────────────────────────────────────
  let T=null, shown=1, guesses=[], over=false;

  function render(){
    const reveal=T.reveal, total=reveal.length;
    let cells='';
    for(let i=0;i<total;i++){
      const f=reveal[i];
      if(i<shown||over){
        cells+='<div class="cell"><img src="'+IMG+'w342'+f.poster+'" alt=""><span class="yr">'+(f.year||'')+'</span></div>';
      }else{
        cells+='<div class="cell'+(i===shown?' next':'')+'"><span class="lock">?</span></div>';
      }
    }
    const attempts=total-START+1;            // one guess per state from START..total posters
    let dots='';
    for(let i=0;i<attempts;i++){
      let c='dot';
      if(guesses[i] && guesses[i].win) c='dot win';
      else if(guesses[i]) c='dot used';
      dots+='<div class="'+c+'"></div>';
    }
    stage.innerHTML=
      '<div class="board">'+cells+'</div>'+
      '<div class="dots">'+dots+'</div>'+
      (over?'':
        '<div class="hint">Whose films are these?</div>'+
        '<div class="guess"><input id="gi" type="text" autocomplete="off" placeholder="Name the actor…"><div class="ac" id="ac" style="display:none"></div></div>'+
        '<div class="row"><button class="btn" id="skip">Reveal one more ('+(total-shown)+' left)</button><button class="btn gold" id="go">Guess</button></div>'+
        '<div class="miss" id="miss"></div>')+
      '<div class="result'+(over?' show':'')+'" id="result"></div>';
    if(over) renderResult(); else wireInputs();
  }

  function wireInputs(){
    const gi=document.getElementById('gi'), ac=document.getElementById('ac');
    document.getElementById('go').onclick=()=>submit(gi.value);
    document.getElementById('skip').onclick=()=>advance(false,null);
    gi.focus();
    let sel=-1, items=[];
    gi.addEventListener('keydown',e=>{
      if(e.key==='Enter'){ if(sel>=0&&items[sel]) submit(items[sel].name); else submit(gi.value); }
      else if(e.key==='ArrowDown'){sel=Math.min(sel+1,items.length-1);paint();e.preventDefault();}
      else if(e.key==='ArrowUp'){sel=Math.max(sel-1,0);paint();e.preventDefault();}
    });
    function paint(){[...ac.children].forEach((el,i)=>el.classList.toggle('sel',i===sel));}
    const lookup=debounce(async q=>{
      if(q.trim().length<2){ac.style.display='none';return;}
      const res=await api('search/multi&query='+encodeURIComponent(q));
      items=(res.results||[]).filter(x=>x.media_type==='person'&&x.profile_path).slice(0,6);
      if(!items.length){ac.style.display='none';return;}
      ac.innerHTML=items.map((p,i)=>
        '<div class="ac-item" data-i="'+i+'"><img src="'+IMG+'w185'+p.profile_path+'" alt=""><div><div class="nm">'+p.name+'</div><div class="kf">'+((p.known_for||[]).slice(0,2).map(k=>k.title||k.name).filter(Boolean).join(', ')||'Actor')+'</div></div></div>').join('');
      sel=-1; ac.style.display='block';
      [...ac.children].forEach(el=>el.onclick=()=>submit(items[+el.dataset.i].name));
    },240);
    gi.addEventListener('input',()=>lookup(gi.value));
  }

  function submit(name){
    if(over||!name||!name.trim()) return;
    const win=norm(name)===norm(T.person.name);
    advance(win,name.trim());
  }
  function advance(win,name){
    guesses.push({name:name||'(skipped)',win});
    if(win){ over=true; render(); return; }
    if(shown>=T.reveal.length){ over=true; render(); return; } // out of posters
    shown++;
    render();
    const m=document.getElementById('miss');
    if(m&&name) m.textContent='“'+name+'” — nope. One more poster…';
  }

  function renderResult(){
    const won=guesses.some(g=>g.win);
    const reels=won?guesses.length:T.reveal.length;
    const p=T.person;
    if(isDaily) saveDone({day:utcDay(),finished:true,won:won,reels:reels,name:p.name,photo:p.profile_path});
    const day=utcDay()-Math.floor(Date.UTC(2026,0,1)/864e5);
    const squares=guesses.map(g=>g.win?'🟩':'🟥').join('');
    const share='🎬 CineReel'+(isDaily?' #'+day:'')+'\n'+squares+' ('+reels+' '+(reels===1?'reel':'reels')+')\nhttps://cinelinks.vercel.app/cinereel.html';
    document.getElementById('result').innerHTML=
      '<h2 class="'+(won?'win':'')+'">'+(won?'Got it!':'So close!')+'</h2>'+
      '<div class="who"><img src="'+face(p.profile_path)+'" alt=""><div><div class="nm">'+p.name+'</div>'+
        '<div class="sub">'+(won?('solved in '+reels+' '+(reels===1?'guess':'guesses')):'the answer')+'</div></div></div>'+
      '<div class="row"><button class="btn" id="shareBtn">Share</button><button class="btn gold" id="again">'+(isDaily?'Practice':'New career')+'</button></div>';
    document.getElementById('again').onclick=()=>{location.href='/cinereel.html'+(isDaily?'?practice=1':'?practice=1&r='+Date.now());};
    document.getElementById('shareBtn').onclick=()=>{
      if(navigator.share){navigator.share({text:share}).catch(()=>{});}
      else{navigator.clipboard&&navigator.clipboard.writeText(share);const b=document.getElementById('shareBtn');b.textContent='Copied ✓';}
    };
  }

  function renderReplay(d){
    stage.innerHTML='<div class="result show">'+
      '<h2 class="'+(d.won?'win':'')+'">'+(d.won?'Solved today':'Today’s answer')+'</h2>'+
      '<div class="who"><img src="'+face(d.photo)+'" alt=""><div><div class="nm">'+d.name+'</div>'+
      '<div class="sub">'+(d.won?('solved in '+d.reels+' '+(d.reels===1?'guess':'guesses')):'come back tomorrow')+'</div></div></div>'+
      '<div class="row"><button class="btn gold" id="again">Practice</button></div>';
    document.getElementById('again').onclick=()=>{location.href='/cinereel.html?practice=1';};
  }

  // ── boot ──────────────────────────────────────────────────
  (async()=>{
    try{
      if(isDaily){const d=loadDone(); if(d&&d.day===utcDay()&&d.finished){renderReplay(d);return;}}
      T=await pickTarget();
      if(!T){stage.innerHTML='<div class="loading">Couldn’t load a career. Reload?</div>';return;}
      shown=Math.min(START,T.reveal.length); guesses=[]; over=false; render();
    }catch(e){stage.innerHTML='<div class="loading">Error: '+e.message+'</div>';}
  })();
})();
</script>
</body>
</html>
