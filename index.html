<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLinks - The Movie Connection Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #e50914;
            --dark: #221f1f;
            --dark-light: #2f2f2f;
            --gray: #564d4d;
            --light: #f5f5f1;
            --accent: #ffd700;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, #1a1a1a 100%);
            color: var(--light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Layout Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* SCREENS */
        .screen {
            display: none;
            animation: fadeIn 0.3s ease-in;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Start Screen */
        #startScreen {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            gap: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo h1 {
            font-size: 4rem;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .logo p {
            font-size: 1.2rem;
            color: var(--gray);
            font-style: italic;
        }

        .api-key-section {
            width: 100%;
            max-width: 500px;
            background: var(--dark-light);
            padding: 30px;
            border-radius: 12px;
            border: 2px solid var(--primary);
            margin-bottom: 20px;
        }

        .api-key-section h3 {
            margin-bottom: 15px;
            font-size: 1.1rem;
            color: var(--accent);
        }

        .api-key-input {
            width: 100%;
            padding: 12px;
            background: var(--dark);
            border: 1px solid var(--gray);
            border-radius: 6px;
            color: var(--light);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .api-key-input::placeholder {
            color: var(--gray);
        }

        .api-key-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.3);
        }

        .api-help {
            font-size: 0.85rem;
            color: var(--gray);
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .api-help a {
            color: var(--accent);
            text-decoration: none;
        }

        .api-help a:hover {
            text-decoration: underline;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #cc0811;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.3);
        }

        .btn-secondary {
            background: var(--dark-light);
            color: var(--light);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }

        .btn-small {
            padding: 10px 20px;
            font-size: 0.9rem;
        }

        /* Game Screen */
        #gameScreen {
            flex-direction: column;
            gap: 20px;
            min-height: 100vh;
            padding-top: 20px;
            padding-bottom: 40px;
        }

        .game-header {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
        }

        .challenge-info {
            background: var(--dark-light);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
        }

        .challenge-info h3 {
            font-size: 0.9rem;
            color: var(--gray);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .challenge-info p {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .click-counter {
            text-align: center;
            background: var(--dark-light);
            padding: 20px;
            border-radius: 8px;
            border-top: 4px solid var(--primary);
        }

        .click-counter h3 {
            font-size: 0.9rem;
            color: var(--gray);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .click-counter .counter {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--accent);
        }

        .game-controls {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-reset {
            background: var(--dark-light);
            color: var(--light);
            border: 1px solid var(--gray);
            padding: 10px 20px;
            font-size: 0.9rem;
        }

        .btn-reset:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* Game Board */
        .game-board {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 40px;
            align-items: stretch;
            margin-bottom: 40px;
        }

        .node-display {
            background: var(--dark-light);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--gray);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .node-display.current {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.3);
        }

        .node-image {
            width: 100%;
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, var(--primary), var(--dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            overflow: hidden;
        }

        .node-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .node-info {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .node-info h2 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            color: var(--accent);
            word-break: break-word;
        }

        .node-type {
            font-size: 0.85rem;
            color: var(--gray);
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .node-meta {
            font-size: 0.95rem;
            color: var(--light);
            margin-bottom: 15px;
            flex-grow: 1;
        }

        /* Connections */
        .connections-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
        }

        .connections-container::-webkit-scrollbar {
            width: 8px;
        }

        .connections-container::-webkit-scrollbar-track {
            background: var(--dark);
            border-radius: 4px;
        }

        .connections-container::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        .connections-container::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        .connection-item {
            background: var(--dark);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--gray);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .connection-item:hover {
            background: var(--dark-light);
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .connection-thumb {
            width: 50px;
            height: 75px;
            background: linear-gradient(135deg, var(--primary), var(--dark));
            border-radius: 4px;
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .connection-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .connection-text {
            flex-grow: 1;
        }

        .connection-name {
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--light);
        }

        .connection-meta {
            font-size: 0.85rem;
            color: var(--gray);
        }

        /* Path Breadcrumb */
        .path-tracker {
            background: var(--dark-light);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .path-tracker h3 {
            font-size: 0.9rem;
            color: var(--gray);
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .path-breadcrumb {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .breadcrumb-item {
            background: var(--dark);
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 0.95rem;
            border: 1px solid var(--gray);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .breadcrumb-item.current {
            background: var(--primary);
            border-color: var(--primary);
            font-weight: 600;
        }

        .breadcrumb-arrow {
            color: var(--primary);
            font-weight: bold;
        }

        /* Win Screen */
        #winScreen {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            gap: 30px;
            text-align: center;
        }

        .win-header {
            margin-bottom: 20px;
        }

        .win-header h1 {
            font-size: 3.5rem;
            color: var(--accent);
            margin-bottom: 10px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }

        .win-header p {
            font-size: 1.3rem;
            color: var(--light);
        }

        .score-box {
            background: var(--dark-light);
            padding: 30px;
            border-radius: 12px;
            border: 2px solid var(--primary);
            max-width: 600px;
            margin-bottom: 20px;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--gray);
            font-size: 1.1rem;
        }

        .score-row:last-child {
            border-bottom: none;
        }

        .score-value {
            font-weight: 600;
            color: var(--accent);
            font-size: 1.3rem;
        }

        .score-optimal {
            color: #4ade80;
        }

        .score-player {
            color: var(--primary);
        }

        .score-diff {
            color: var(--gray);
            font-size: 0.9rem;
        }

        .path-comparison {
            background: var(--dark-light);
            padding: 25px;
            border-radius: 12px;
            max-width: 700px;
            text-align: left;
            margin-bottom: 20px;
        }

        .path-comparison h3 {
            color: var(--accent);
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .path-list {
            background: var(--dark);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-family: 'Monaco', monospace;
            font-size: 0.9rem;
            max-height: 150px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .path-list:last-child {
            margin-bottom: 0;
        }

        .path-list.optimal {
            border-left: 4px solid #4ade80;
        }

        .path-list.player {
            border-left: 4px solid var(--primary);
        }

        .path-label {
            color: var(--gray);
            font-size: 0.85rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .end-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        /* Loading State */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--gray);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error Message */
        .error-message {
            background: rgba(229, 9, 20, 0.1);
            border: 1px solid var(--primary);
            color: var(--light);
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }

        /* Search Results Modal */
        .search-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .search-modal.active {
            display: flex;
        }

        .search-modal-content {
            background: var(--dark-light);
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            border: 2px solid var(--primary);
        }

        .search-modal h2 {
            margin-bottom: 20px;
            color: var(--accent);
        }

        .search-input {
            width: 100%;
            padding: 12px;
            background: var(--dark);
            border: 1px solid var(--gray);
            border-radius: 6px;
            color: var(--light);
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.3);
        }

        .search-results {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .search-result-item {
            background: var(--dark);
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 10px;
            border: 1px solid var(--gray);
            transition: all 0.2s ease;
        }

        .search-result-item:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .result-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .result-type {
            font-size: 0.85rem;
            color: var(--gray);
        }

        .search-modal-buttons {
            display: flex;
            gap: 10px;
        }

        .search-modal-buttons .btn {
            flex: 1;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .game-board {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .game-header {
                grid-template-columns: 1fr;
            }

            .btn {
                padding: 12px 24px;
                font-size: 1rem;
            }

            .logo h1 {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }

            .logo h1 {
                font-size: 2rem;
            }

            .game-header {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .challenge-info,
            .click-counter {
                padding: 15px;
            }

            .node-info h2 {
                font-size: 1.1rem;
            }

            .connections-container {
                max-height: 400px;
            }

            .menu-buttons {
                max-width: 100%;
            }

            .search-modal-content {
                max-width: 100%;
            }

            .win-header h1 {
                font-size: 2rem;
            }

            .score-box {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Start Screen -->
    <div id="startScreen" class="screen active">
        <div class="container" style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; gap: 40px;">
            <div class="logo">
                <h1>🎬 CineLinks</h1>
                <p>Connect the dots between movies and actors</p>
            </div>
            <div class="menu-buttons">
                <button class="btn btn-primary" onclick="game.startDailyChallenge()">
                    📅 Daily Challenge
                </button>
                <button class="btn btn-primary" onclick="game.startRandomChallenge()">
                    🎲 Random Challenge
                </button>
                <button class="btn btn-secondary" onclick="game.startCustomChallenge()">
                    ⚙️ Custom Challenge
                </button>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="screen">
        <div class="container">
            <div class="game-header">
                <div class="challenge-info">
                    <h3>Challenge</h3>
                    <p id="startNode"></p>
                    <p style="font-size: 0.9rem; color: var(--gray); margin-top: 8px;">→</p>
                    <p id="endNode" style="margin-top: 8px;"></p>
                </div>

                <div style="display: flex; align-items: center; justify-content: center; gap: 20px;">
                    <div style="text-align: center;">
                        <h3 style="font-size: 0.9rem; color: var(--gray); text-transform: uppercase; margin-bottom: 8px;">Current</h3>
                        <p id="currentNode" style="font-size: 1.2rem; font-weight: 600;"></p>
                    </div>
                </div>

                <div class="click-counter">
                    <h3>Clicks</h3>
                    <div class="counter" id="clickCounter">0</div>
                </div>

                <div class="game-controls">
                    <button class="btn btn-reset btn-small" onclick="game.goHome()">← Home</button>
                    <button class="btn btn-reset btn-small" onclick="game.resetGame()">↻ Reset</button>
                </div>
            </div>

            <div class="path-tracker">
                <h3>Path</h3>
                <div class="path-breadcrumb" id="pathBreadcrumb">
                    <span class="breadcrumb-item" id="startBreadcrumb"></span>
                </div>
            </div>

            <div class="game-board">
                <!-- Left Node -->
                <div class="node-display current">
                    <div class="node-image" id="currentImage">
                        <span id="imageLoadingSpinner" class="loading" style="display: none;"></span>
                    </div>
                    <div class="node-info">
                        <div class="node-type" id="currentType"></div>
                        <h2 id="currentName"></h2>
                        <div class="node-meta" id="currentMeta"></div>
                    </div>
                </div>

                <!-- Center: Connections -->
                <div style="display: flex; flex-direction: column;">
                    <h3 style="color: var(--gray); text-transform: uppercase; font-size: 0.9rem; margin-bottom: 15px; letter-spacing: 1px;">
                        <span id="connectionsLabel">Connections</span>
                    </h3>
                    <div class="connections-container" id="connectionsContainer">
                        <div class="loading"></div>
                    </div>
                </div>

                <!-- Right Node -->
                <div class="node-display">
                    <div class="node-image" id="targetImage"></div>
                    <div class="node-info">
                        <div class="node-type" id="targetType"></div>
                        <h2 id="targetName"></h2>
                        <div class="node-meta" id="targetMeta"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Win Screen -->
    <div id="winScreen" class="screen">
        <div class="container" style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; gap: 30px;">
            <div class="win-header">
                <h1>🎉 Success!</h1>
                <p id="winMessage"></p>
            </div>

            <div class="score-box">
                <div class="score-row">
                    <span>Your Clicks:</span>
                    <span class="score-value score-player" id="playerClicks"></span>
                </div>
                <div class="score-row">
                    <span>Optimal Path:</span>
                    <span class="score-value score-optimal" id="optimalClicks"></span>
                </div>
                <div class="score-row">
                    <span>Efficiency:</span>
                    <span class="score-value" id="efficiency"></span>
                </div>
            </div>

            <div class="path-comparison">
                <h3>Your Path</h3>
                <div class="path-list player" id="playerPath"></div>

                <h3>Optimal Path (if different)</h3>
                <div class="path-list optimal" id="optimalPath"></div>
            </div>

            <div class="end-buttons">
                <button class="btn btn-primary" onclick="game.goHome()">Play Again</button>
                <button class="btn btn-secondary" onclick="game.shareResult()">Share Result</button>
            </div>
        </div>
    </div>

    <script>
        // =====================
        // GAME ENGINE
        // =====================

        const game = {
            baseUrl: '/api/tmdb',
            currentNode: null,
            startNode: null,
            endNode: null,
            path: [],
            clickCount: 0,
            visited: new Set(),
            gameMode: 'random',

            // Initialize
            init() {
                // API key handled server-side via proxy
            },


            showApiError(message) {
                const errorEl = document.getElementById('apiKeyError');
                errorEl.textContent = message;
                errorEl.style.display = 'block';
            },

            hideApiError() {
                document.getElementById('apiKeyError').style.display = 'none';
            },

            async checkApiKey() {
                try {
                    const response = await fetch(`${this.baseUrl}?path=movie/550`);
                    if (!response.ok) {
                        console.error('TMDB proxy error');
                        return false;
                    }
                    return true;
                } catch (e) {
                    console.error('Error connecting to TMDB proxy:', e);
                    return false;
                }
            },

            // Screen Management
            showScreen(screenId) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(screenId).classList.add('active');
                window.scrollTo(0, 0);
            },

            // Challenge Modes
            async startDailyChallenge() {
                if (!await this.checkApiKey()) return;

                const date = new Date();
                const seed = date.getFullYear() * 10000 + (date.getMonth() + 1) * 100 + date.getDate();

                const challenges = [
                    { start: { name: 'Tom Hanks', type: 'person', id: 12 }, end: { name: 'The Matrix', type: 'movie', id: 603 } },
                    { start: { name: 'Meryl Streep', type: 'person', id: 5064 }, end: { name: 'Avatar', type: 'movie', id: 19995 } },
                    { start: { name: 'Leonardo DiCaprio', type: 'person', id: 6193 }, end: { name: 'Inception', type: 'movie', id: 27205 } },
                    { start: { name: 'Angelina Jolie', type: 'person', id: 11701 }, end: { name: 'The Dark Knight', type: 'movie', id: 155 } },
                    { start: { name: 'Morgan Freeman', type: 'person', id: 192 }, end: { name: 'Titanic', type: 'movie', id: 597 } },
                    { start: { name: 'Cate Blanchett', type: 'person', id: 2014 }, end: { name: 'Gladiator', type: 'movie', id: 98 } },
                    { start: { name: 'Johnny Depp', type: 'person', id: 85 }, end: { name: 'The Shawshank Redemption', type: 'movie', id: 278 } },
                    { start: { name: 'Scarlett Johansson', type: 'person', id: 1245 }, end: { name: 'Forrest Gump', type: 'movie', id: 13 } },
                ];

                const challenge = challenges[seed % challenges.length];
                this.gameMode = 'daily';
                await this.startGame(challenge.start, challenge.end);
            },

            async startRandomChallenge() {
                if (!await this.checkApiKey()) return;

                // Popular actors and movies
                const actors = [
                    { name: 'Tom Hanks', id: 12 },
                    { name: 'Meryl Streep', id: 5064 },
                    { name: 'Leonardo DiCaprio', id: 6193 },
                    { name: 'Morgan Freeman', id: 192 },
                    { name: 'Johnny Depp', id: 85 },
                    { name: 'Robert De Niro', id: 4 },
                    { name: 'Cate Blanchett', id: 2014 },
                    { name: 'Brad Pitt', id: 287 },
                    { name: 'Denzel Washington', id: 5292 },
                    { name: 'Audrey Hepburn', id: 1 },
                ];

                const movies = [
                    { name: 'The Matrix', id: 603 },
                    { name: 'Avatar', id: 19995 },
                    { name: 'Inception', id: 27205 },
                    { name: 'The Dark Knight', id: 155 },
                    { name: 'Titanic', id: 597 },
                    { name: 'Gladiator', id: 98 },
                    { name: 'The Shawshank Redemption', id: 278 },
                    { name: 'Forrest Gump', id: 13 },
                    { name: 'Pulp Fiction', id: 680 },
                    { name: 'Jurassic Park', id: 25 },
                ];

                const start = actors[Math.floor(Math.random() * actors.length)];
                const end = movies[Math.floor(Math.random() * movies.length)];

                this.gameMode = 'random';
                await this.startGame(
                    { name: start.name, type: 'person', id: start.id },
                    { name: end.name, type: 'movie', id: end.id }
                );
            },

            async startCustomChallenge() {
                if (!await this.checkApiKey()) return;

                // Show search modal for start node
                const start = await this.showSearchModal('Select Start Node');
                if (!start) return;

                // Show search modal for end node
                const end = await this.showSearchModal('Select End Node');
                if (!end) return;

                if (start.id === end.id && start.type === end.type) {
                    alert('Start and end must be different!');
                    return this.startCustomChallenge();
                }

                this.gameMode = 'custom';
                await this.startGame(start, end);
            },

            showSearchModal(title) {
                return new Promise((resolve) => {
                    const modal = document.createElement('div');
                    modal.className = 'search-modal active';
                    modal.innerHTML = `
                        <div class="search-modal-content">
                            <h2>${title}</h2>
                            <input
                                type="text"
                                class="search-input"
                                id="searchInput"
                                placeholder="Search movies and actors..."
                                autofocus
                            >
                            <div class="search-results" id="searchResults"></div>
                            <div class="search-modal-buttons">
                                <button class="btn btn-secondary btn-small" onclick="this.closest('.search-modal').remove()">Cancel</button>
                            </div>
                        </div>
                    `;
                    document.body.appendChild(modal);

                    let searchTimeout;
                    const searchInput = modal.querySelector('#searchInput');
                    const resultsContainer = modal.querySelector('#searchResults');

                    searchInput.addEventListener('input', async (e) => {
                        clearTimeout(searchTimeout);
                        const query = e.target.value.trim();

                        if (query.length < 2) {
                            resultsContainer.innerHTML = '';
                            return;
                        }

                        resultsContainer.innerHTML = '<div class="loading"></div>';

                        searchTimeout = setTimeout(async () => {
                            try {
                                const movies = await this.searchMovies(query);
                                const people = await this.searchPeople(query);

                                let html = '';

                                if (movies.length === 0 && people.length === 0) {
                                    html = '<p style="color: var(--gray);">No results found</p>';
                                } else {
                                    if (people.length > 0) {
                                        people.forEach(p => {
                                            const thumb = p.profile_path ? `https://image.tmdb.org/t/p/w185${p.profile_path}` : '👤';
                                            html += `
                                                <div class="search-result-item" onclick="window.selectedResult = ${JSON.stringify({ name: p.name, type: 'person', id: p.id })};  document.querySelectorAll('.search-modal').forEach(m => m.remove());">
                                                    <div class="result-title">${p.name}</div>
                                                    <div class="result-type">Actor/Director</div>
                                                </div>
                                            `;
                                        });
                                    }

                                    if (movies.length > 0) {
                                        movies.forEach(m => {
                                            const year = m.release_date ? new Date(m.release_date).getFullYear() : '';
                                            html += `
                                                <div class="search-result-item" onclick="window.selectedResult = ${JSON.stringify({ name: m.title, type: 'movie', id: m.id })};  document.querySelectorAll('.search-modal').forEach(m => m.remove());">
                                                    <div class="result-title">${m.title}</div>
                                                    <div class="result-type">Movie ${year ? '(' + year + ')' : ''}</div>
                                                </div>
                                            `;
                                        });
                                    }
                                }

                                resultsContainer.innerHTML = html;
                            } catch (e) {
                                resultsContainer.innerHTML = '<p style="color: var(--primary);">Error searching</p>';
                            }
                        }, 300);
                    });

                    // Wait for selection
                    const checkInterval = setInterval(() => {
                        if (window.selectedResult) {
                            clearInterval(checkInterval);
                            const result = window.selectedResult;
                            window.selectedResult = null;
                            modal.remove();
                            resolve(result);
                        }
                        if (!document.body.contains(modal)) {
                            clearInterval(checkInterval);
                            resolve(null);
                        }
                    }, 50);

                    searchInput.focus();
                });
            },

            // Game Flow
            async startGame(startNode, endNode) {
                this.startNode = startNode;
                this.endNode = endNode;
                this.currentNode = startNode;
                this.path = [startNode];
                this.clickCount = 0;
                this.visited = new Set([`${startNode.type}-${startNode.id}`]);

                this.showScreen('gameScreen');
                this.updateGameDisplay();
                await this.loadConnections();
            },

            async updateGameDisplay() {
                // Update challenge info
                document.getElementById('startNode').textContent = this.startNode.name;
                document.getElementById('endNode').textContent = this.endNode.name;
                document.getElementById('currentNode').textContent = this.currentNode.name;

                // Update path breadcrumb
                const breadcrumb = document.getElementById('pathBreadcrumb');
                breadcrumb.innerHTML = '';

                this.path.forEach((node, idx) => {
                    const item = document.createElement('span');
                    item.className = 'breadcrumb-item' + (idx === this.path.length - 1 ? ' current' : '');
                    item.textContent = node.name;
                    breadcrumb.appendChild(item);

                    if (idx < this.path.length - 1) {
                        const arrow = document.createElement('span');
                        arrow.className = 'breadcrumb-arrow';
                        arrow.textContent = '→';
                        breadcrumb.appendChild(arrow);
                    }
                });

                document.getElementById('clickCounter').textContent = this.clickCount;

                // Update current node display
                await this.displayNode(this.currentNode, 'current');

                // Update target node display
                await this.displayNode(this.endNode, 'target');

                // Update connections label
                const label = this.currentNode.type === 'movie' ? 'Cast' : 'Filmography';
                document.getElementById('connectionsLabel').textContent = label;

                // Check if reached
                if (this.currentNode.id === this.endNode.id && this.currentNode.type === this.endNode.type) {
                    await this.onGameWin();
                }
            },

            async displayNode(node, target) {
                const prefix = target === 'current' ? '' : 'target';
                const imageEl = document.getElementById(prefix + 'Image');
                const typeEl = document.getElementById(prefix + 'Type');
                const nameEl = document.getElementById(prefix + 'Name');
                const metaEl = document.getElementById(prefix + 'Meta');

                // Type
                typeEl.textContent = node.type === 'movie' ? 'Movie' : 'Actor';

                // Name
                nameEl.textContent = node.name;

                // Fetch and display image + metadata
                try {
                    if (node.type === 'movie') {
                        const data = await this.fetchMovie(node.id);
                        if (data.poster_path) {
                            imageEl.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${data.poster_path}" alt="${node.name}">`;
                        }
                        const year = data.release_date ? new Date(data.release_date).getFullYear() : '';
                        const rating = data.vote_average ? data.vote_average.toFixed(1) : '?';
                        metaEl.innerHTML = `
                            <strong>${year}</strong><br>
                            Rating: ${rating}/10<br>
                            ${data.overview ? data.overview.substring(0, 100) + '...' : ''}
                        `;
                    } else {
                        const data = await this.fetchPerson(node.id);
                        if (data.profile_path) {
                            imageEl.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${data.profile_path}" alt="${node.name}">`;
                        }
                        metaEl.innerHTML = `
                            <strong>Actor</strong><br>
                            ${data.biography ? data.biography.substring(0, 100) + '...' : 'Popular actor'}
                        `;
                    }
                } catch (e) {
                    console.error('Error displaying node:', e);
                }
            },

            async loadConnections() {
                const container = document.getElementById('connectionsContainer');
                container.innerHTML = '<div class="loading"></div>';

                try {
                    let connections = [];

                    if (this.currentNode.type === 'movie') {
                        const credits = await this.fetchMovieCredits(this.currentNode.id);
                        connections = credits.cast.slice(0, 30).map(actor => ({
                            name: actor.name,
                            type: 'person',
                            id: actor.id,
                            character: actor.character,
                            poster_path: actor.profile_path
                        }));
                    } else {
                        const credits = await this.fetchPersonCredits(this.currentNode.id);
                        connections = credits.cast.slice(0, 30).map(movie => ({
                            name: movie.title,
                            type: 'movie',
                            id: movie.id,
                            year: movie.release_date ? new Date(movie.release_date).getFullYear() : '',
                            poster_path: movie.poster_path
                        }));
                    }

                    container.innerHTML = '';

                    if (connections.length === 0) {
                        container.innerHTML = '<p style="color: var(--gray);">No connections found</p>';
                        return;
                    }

                    connections.forEach(conn => {
                        const item = document.createElement('div');
                        item.className = 'connection-item';
                        item.innerHTML = `
                            <div class="connection-thumb">
                                ${conn.poster_path ? `<img src="https://image.tmdb.org/t/p/w185${conn.poster_path}" alt="">` : ''}
                            </div>
                            <div class="connection-text">
                                <div class="connection-name">${conn.name}</div>
                                <div class="connection-meta">
                                    ${conn.character ? `as ${conn.character}` : ''}
                                    ${conn.year ? conn.year : ''}
                                </div>
                            </div>
                        `;
                        item.addEventListener('click', async () => {
                            if (!this.visited.has(`${conn.type}-${conn.id}`)) {
                                this.currentNode = conn;
                                this.path.push(conn);
                                this.visited.add(`${conn.type}-${conn.id}`);
                                this.clickCount++;
                                await this.updateGameDisplay();
                                await this.loadConnections();
                            }
                        });
                        container.appendChild(item);
                    });
                } catch (e) {
                    console.error('Error loading connections:', e);
                    container.innerHTML = '<p style="color: var(--primary);">Error loading connections</p>';
                }
            },

            async onGameWin() {
                // Calculate optimal path via BFS
                const optimalPath = await this.findOptimalPath(this.startNode, this.endNode);

                this.showScreen('winScreen');

                const playerClicks = this.clickCount;
                const optimalClicks = optimalPath.length - 1;
                const efficiency = Math.round((optimalClicks / playerClicks) * 100);

                document.getElementById('playerClicks').textContent = playerClicks;
                document.getElementById('optimalClicks').textContent = optimalClicks;
                document.getElementById('efficiency').textContent = efficiency + '%';

                // Display paths
                const playerPathStr = this.path.map(n => n.name).join(' → ');
                const optimalPathStr = optimalPath.map(n => n.name).join(' → ');

                document.getElementById('playerPath').textContent = playerPathStr;
                document.getElementById('optimalPath').textContent = optimalPathStr;

                const message = playerClicks === optimalClicks
                    ? '🏆 Perfect path!'
                    : `You found it in ${playerClicks} clicks!`;
                document.getElementById('winMessage').textContent = message;
            },

            async findOptimalPath(start, end) {
                const queue = [[start]];
                const visited = new Set([`${start.type}-${start.id}`]);

                while (queue.length > 0) {
                    const path = queue.shift();
                    const current = path[path.length - 1];

                    if (current.id === end.id && current.type === end.type) {
                        return path;
                    }

                    let connections = [];
                    try {
                        if (current.type === 'movie') {
                            const credits = await this.fetchMovieCredits(current.id);
                            connections = credits.cast.map(a => ({ name: a.name, type: 'person', id: a.id }));
                        } else {
                            const credits = await this.fetchPersonCredits(current.id);
                            connections = credits.cast.map(m => ({ name: m.title, type: 'movie', id: m.id }));
                        }
                    } catch (e) {
                        continue;
                    }

                    connections.forEach(conn => {
                        const key = `${conn.type}-${conn.id}`;
                        if (!visited.has(key)) {
                            visited.add(key);
                            queue.push([...path, conn]);
                        }
                    });

                    // Limit search depth to avoid infinite loops
                    if (path.length > 10) {
                        break;
                    }
                }

                return [start, end]; // Fallback
            },

            resetGame() {
                if (this.gameMode === 'daily') {
                    this.startDailyChallenge();
                } else if (this.gameMode === 'random') {
                    this.startRandomChallenge();
                } else {
                    this.startCustomChallenge();
                }
            },

            goHome() {
                this.showScreen('startScreen');
            },

            shareResult() {
                const text = `I completed CineLinks in ${this.clickCount} clicks! 🎬 Can you do better? Play at cinelinks.com`;
                const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
                window.open(url, '_blank');
            },

            // API Methods
            async fetchMovie(id) {
                const response = await fetch(`${this.baseUrl}?path=movie/${id}`);
                return response.json();
            },

            async fetchPerson(id) {
                const response = await fetch(`${this.baseUrl}?path=person/${id}`);
                return response.json();
            },

            async fetchMovieCredits(id) {
                const response = await fetch(`${this.baseUrl}?path=movie/${id}/credits`);
                return response.json();
            },

            async fetchPersonCredits(id) {
                const response = await fetch(`${this.baseUrl}?path=person/${id}/movie_credits`);
                return response.json();
            },

            async searchMovies(query) {
                const response = await fetch(`${this.baseUrl}?path=search/movie&query=${encodeURIComponent(query)}`);
                const data = await response.json();
                return data.results.slice(0, 10);
            },

            async searchPeople(query) {
                const response = await fetch(`${this.baseUrl}?path=search/person&query=${encodeURIComponent(query)}`);
                const data = await response.json();
                return data.results.slice(0, 10);
            }
        };

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            game.init();
        });
    </script>
</body>
