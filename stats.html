<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your stats - CineLinks suite</title>
<meta name="description" content="Your streaks and history across the CineLinks film games.">
<meta name="theme-color" content="#0d0d0d">
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://cinelinks.vercel.app/stats.html">
<link rel="icon" type="image/png" href="/logo.png">
<meta property="og:type" content="website">
<meta property="og:title" content="Your stats - CineLinks suite">
<meta property="og:description" content="Your streaks and history across the CineLinks film games.">
<meta property="og:url" content="https://cinelinks.vercel.app/stats.html">
<meta property="og:image" content="https://cinelinks.vercel.app/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@cinelinksgame">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--s1:#181818;--s2:#222;--bdr:rgba(255,255,255,0.09);--txt:#f0f0f0;--mut:#8d8d8d;--gold:#e8a000;--golddim:rgba(232,160,0,0.15)}
body{font-family:'Inter',-apple-system,sans-serif;background:radial-gradient(circle at 50% -10%,rgba(232,160,0,.08),transparent 34%),linear-gradient(180deg,#101010 0%,var(--bg) 330px);color:var(--txt);min-height:100vh}
.wrap{max-width:540px;margin:0 auto;padding:18px 16px 60px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.home-link{display:inline-flex;align-items:center;gap:6px;color:var(--mut);text-decoration:none;font-size:.8rem;font-weight:600}
.home-link:hover{color:var(--gold)}
.head{text-align:center;margin-bottom:22px}
.title{font-size:1.8rem;font-weight:800;letter-spacing:-.02em}
.subtitle{color:var(--mut);font-size:.85rem;margin-top:4px}
.card{background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:14px;padding:18px;margin-bottom:14px}
.card-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.card-icon{width:38px;height:38px;border-radius:10px;background:var(--golddim);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.card-title{font-size:1.05rem;font-weight:800}
.card-sub{font-size:.74rem;color:var(--mut);margin-top:1px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat{background:rgba(255,255,255,.03);border:1px solid var(--bdr);border-radius:10px;padding:12px 8px;text-align:center}
.stat-n{font-size:1.5rem;font-weight:800;color:var(--gold);line-height:1}
.stat-l{font-size:.62rem;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-top:5px}
.card-actions{display:flex;gap:8px}
.btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--bdr);background:transparent;color:var(--txt);font-family:inherit;font-size:.82rem;font-weight:700;text-decoration:none;text-align:center;transition:border-color .15s,background .15s}
.btn:hover{border-color:rgba(232,160,0,.5);background:rgba(232,160,0,.05)}
.btn-gold{background:var(--gold);color:#111;border-color:var(--gold)}
.empty{color:var(--mut);font-size:.82rem;text-align:center;padding:6px 0 12px}
.ext{display:flex;align-items:center;gap:12px;background:rgba(232,160,0,.07);border:1px solid rgba(232,160,0,.25);border-radius:14px;padding:14px;text-decoration:none;color:var(--txt)}
.ext:hover{background:rgba(232,160,0,.12)}
.ext-i{width:38px;height:38px;border-radius:10px;background:rgba(232,160,0,.15);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.ext-t{flex:1}.ext-t b{font-size:.9rem}.ext-t span{display:block;font-size:.72rem;color:var(--mut);margin-top:1px}
.ext-arrow{color:var(--gold);font-weight:700}
.footer{text-align:center;margin-top:22px;color:var(--mut);font-size:.68rem;opacity:.7}
.site-foot{text-align:center;margin-top:14px;font-size:.78rem;color:var(--mut)}
.site-foot a{color:var(--mut);text-decoration:none;font-weight:600}
.site-foot a:hover{color:var(--gold)}
.site-foot .dot{margin:0 8px;opacity:.5}
.reset{display:block;margin:18px auto 0;background:none;border:none;color:var(--mut);font-size:.72rem;cursor:pointer;text-decoration:underline;opacity:.6}
.reset:hover{opacity:1;color:#d8503a}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="home-link" href="/">&#8592; Home</a>
    <span class="home-link" style="cursor:default">Your stats</span>
  </div>
  <div class="head">
    <div class="title">Your stats</div>
    <div class="subtitle">Streaks &amp; history across the film games on this site.</div>
  </div>
  <div id="cards"></div>
  <div class="footer">Stats are stored on this device. Clearing your browser data resets them.</div>
  <div class="site-foot">
    <a href="https://x.com/cinelinksgame" target="_blank" rel="noopener">Follow on X</a>
    <span class="dot">·</span>
    <a href="mailto:cinelinksgame@gmail.com">Contact</a>
    <span class="dot">·</span>
    <a href="/privacy.html">Privacy</a>
  </div>
  <button class="reset" id="resetBtn">Reset all stats on this device</button>
</div>
<script>
function getLS(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch(_){ return null; } }
function todayKey(){ try{ return new Intl.DateTimeFormat('en-CA',{timeZone:'Europe/Madrid'}).format(new Date()); }catch(_){ return new Date().toISOString().slice(0,10); } }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function cineLinks(){
  const streak = getLS('clStreak') || {current:0,best:0};
  const played = getLS('clPlayed') || {};
  const dates = Object.keys(played);
  const best = dates.length ? Math.min.apply(null, dates.map(d=>played[d])) : null;
  const doneToday = played[todayKey()] != null || (getLS('clDailyResult')||{}).date === todayKey();
  return {
    icon:'🔗', title:'CineLinks', sub:'Connect the film world',
    stats:[
      {n: streak.current|0, l:'Streak'},
      {n: streak.best|0, l:'Best streak'},
      {n: doneToday ? '✓' : '-', l:'Today'}
    ],
    extra: doneToday ? 'Solved today ✓' : (dates.length ? (dates.length + ' day' + (dates.length===1?'':'s') + ' played') : 'Not played today'),
    daily:'/?daily=1', practice:'/?practice=1'  // jump straight into play
  };
}
function cineClue(){
  const streak = getLS('cineclueStreak') || {current:0,best:0};
  const state = getLS('cineclueState');
  const todayDone = state && state.finished ? (state.solved ? 'Solved today ✓' : 'Played today') : 'Not played today';
  return {
    icon:'🔍', title:'CineClue', sub:'Guess the film from clues',
    stats:[
      {n: streak.current|0, l:'Streak'},
      {n: streak.best|0, l:'Best streak'},
      {n: state? '✓':'-', l:'Today'}
    ],
    extra: todayDone,
    daily:'/cineclue.html', practice:'/cineclue.html?practice=1'
  };
}

function cardHTML(g){
  return '<div class="card">' +
    '<div class="card-head"><div class="card-icon">'+g.icon+'</div>' +
      '<div><div class="card-title">'+esc(g.title)+'</div><div class="card-sub">'+esc(g.sub)+'</div></div></div>' +
    '<div class="stat-grid">' + g.stats.map(s=>'<div class="stat"><div class="stat-n">'+esc(s.n)+'</div><div class="stat-l">'+esc(s.l)+'</div></div>').join('') + '</div>' +
    (g.extra ? '<div class="empty">'+esc(g.extra)+'</div>' : '') +
    '<div class="card-actions"><a class="btn btn-gold" href="'+g.daily+'">Daily</a><a class="btn" href="'+g.practice+'">Practice</a></div>' +
  '</div>';
}

function cineFrame(){
  const streak = getLS('cineframeStreak') || {current:0,best:0};
  const state = getLS('cineframeState');
  const todayDone = state && state.finished ? (state.solved ? 'Solved today ✓' : 'Played today') : 'Not played today';
  return {
    icon:'🎞️', title:'CineFrame', sub:'Guess the film from a frame',
    stats:[
      {n: streak.current|0, l:'Streak'},
      {n: streak.best|0, l:'Best streak'},
      {n: state? '✓':'-', l:'Today'}
    ],
    extra: todayDone,
    daily:'/cineframe.html', practice:'/cineframe.html?practice=1'
  };
}

function cineCast(){
  const streak = getLS('cinecastStreak') || {current:0,best:0};
  const state = getLS('cinecastState');
  const todayDone = state && state.finished ? (state.solved ? 'Solved today ✓' : 'Played today') : 'Not played today';
  return {
    icon:'🎭', title:'CineCast', sub:'Guess the film from its cast',
    stats:[{n: streak.current|0, l:'Streak'},{n: streak.best|0, l:'Best streak'},{n: state? '✓':'-', l:'Today'}],
    extra: todayDone, daily:'/cinecast.html', practice:'/cinecast.html?practice=1'
  };
}
function cinePlot(){
  const streak = getLS('cineplotStreak') || {current:0,best:0};
  const state = getLS('cineplotState');
  const todayDone = state && state.finished ? (state.solved ? 'Solved today ✓' : 'Played today') : 'Not played today';
  return {
    icon:'📖', title:'CinePlot', sub:'Guess the film from its synopsis',
    stats:[{n: streak.current|0, l:'Streak'},{n: streak.best|0, l:'Best streak'},{n: state? '✓':'-', l:'Today'}],
    extra: todayDone, daily:'/cineplot.html', practice:'/cineplot.html?practice=1'
  };
}

// Rating games now live under the same origin (/rating via a rewrite), so we can
// read their localStorage too. The Higher-or-Lower daily persists cinerating_daily
// = {date:"YYYYMMDD" (UTC), score, maxStreak}.
function ratingTodayKey(){
  const d = new Date();
  return '' + d.getUTCFullYear() + String(d.getUTCMonth()+1).padStart(2,'0') + String(d.getUTCDate()).padStart(2,'0');
}
function cineRating(){
  const d = getLS('cinerating_daily');
  const doneToday = d && d.date === ratingTodayKey();
  return {
    icon:'⭐', title:'Rating games', sub:'Higher or Lower · Career · Guess the Score',
    stats:[
      {n: doneToday ? (d.score|0)+'/10' : '-', l:'Today'},
      {n: doneToday ? (d.maxStreak|0) : 0, l:'Best streak'},
      {n: doneToday ? '✓' : '-', l:'Daily'}
    ],
    extra: doneToday ? ('Higher or Lower: '+(d.score|0)+'/10 today ✓') : 'Not played today',
    daily:'/rating/versus?mode=daily', practice:'/rating/versus'
  };
}

function render(){
  document.getElementById('cards').innerHTML =
    cardHTML(cineLinks()) +
    cardHTML(cineClue()) +
    cardHTML(cineFrame()) +
    cardHTML(cineCast()) +
    cardHTML(cinePlot()) +
    cardHTML(cineRating());
}
render();
// Re-read localStorage whenever the user returns (e.g. after playing a game in
// another tab) so freshly-won dailies show up without a manual reload.
window.addEventListener('focus', render);
window.addEventListener('pageshow', render);
document.addEventListener('visibilitychange', () => { if(!document.hidden) render(); });
window.addEventListener('storage', render);

document.getElementById('resetBtn').onclick = () => {
  if(!confirm('Reset all CineLinks & CineClue stats on this device?')) return;
  ['clStreak','clPlayed','cineclueStreak','cineclueState'].forEach(k=>{ try{ localStorage.removeItem(k); }catch(_){} });
  location.reload();
};
</script>
<script>window.onStatsSync = function () { try { render(); } catch (_) {} };</script>
<script defer src="/ads.js"></script>
<script defer src="/support.js"></script>
<script defer src="/lib/merge-stats.js"></script>
<script defer src="/auth.js"></script>
<script defer src="/cookie.js"></script>
</body>
</html>
